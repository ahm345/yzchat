<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧠 Blueprint Asistanı v5</title>
  <style>
    /* ===== RESET & VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0e11;
      --surface: #161b22;
      --surface2: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    html {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      /* ✅ SABİT GİRİŞ ÇUBUĞU DÜZELTMESİ:
         100vh mobilde adres çubuğunu/klavyeyi hesaba katmaz, bu yüzden input
         alanı yazı yazarken ekranın altına kayıp kayboluyordu. --app-height,
         aşağıdaki script ile window.visualViewport üzerinden gerçek zamanlı
         hesaplanıyor; 100vh/100dvh sadece JS çalışmadan önceki ilk an için
         yedek (fallback) olarak duruyor. */
      height: 100vh;
      height: 100dvh;
      height: calc(var(--app-height, 100vh));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: fixed;
      inset: 0;
      width: 100%;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      min-height: 56px;
      flex-wrap: wrap;
      row-gap: 8px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a371f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-version {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      flex-wrap: wrap;
      row-gap: 6px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.online {
      background: var(--green);
      box-shadow: 0 0 8px rgba(63, 185, 80, 0.4);
    }

    .status-dot.offline {
      background: var(--red);
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar {
      width: 6px;
    }

    .chat-area::-webkit-scrollbar-track {
      background: var(--bg);
    }

    .chat-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }

    .message {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.6;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
      border-left: 3px solid #58a6ff; 
    }

    .message.yz {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      border-left: 3px solid #3fb950;  
    }

    .message .meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .message .etiket {
      font-size: 11px;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      padding: 1px 8px;
      border-radius: 12px;
      border: 1px solid rgba(88, 166, 255, 0.2);
    }

    .message .etiket.karar { background: rgba(63, 185, 80, 0.15); color: var(--green); border-color: rgba(63, 185, 80, 0.2); }
    .message .etiket.sorun { background: rgba(248, 81, 73, 0.15); color: var(--red); border-color: rgba(248, 81, 73, 0.2); }
    .message .etiket.ekle { background: rgba(210, 153, 34, 0.15); color: var(--orange); border-color: rgba(210, 153, 34, 0.2); }
    .message .etiket.arge { background: rgba(163, 113, 247, 0.15); color: #a371f7; border-color: rgba(163, 113, 247, 0.2); }

    .message.system {
      align-self: center;
      background: var(--surface2);
      border: 1px dashed var(--border);
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      max-width: 95%;
    }

    .onay-container {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .btn-onay {
      padding: 6px 18px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-onay.evet { background: var(--green); color: #0b0e11; }
    .btn-onay.evet:hover { opacity: 0.85; }
    .btn-onay.hayir { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-onay.hayir:hover { background: var(--border); }

    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px calc(14px + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }

    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    .input-row textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border 0.2s;
      min-height: 48px;
      max-height: 120px;
      line-height: 1.5;
    }

    .input-row textarea:focus { border-color: var(--accent); }
    .input-row textarea::placeholder { color: var(--text-muted); }

    .btn-gonder {
      background: var(--accent);
      color: #0b0e11;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-gonder:hover { background: var(--accent-hover); transform: scale(1.02); }
    .btn-gonder:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .etiket-bar { display: flex; gap: 6px; flex-wrap: wrap; }

    .etiket-btn {
      font-size: 12px;
      padding: 3px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: 0.2s;
    }

    .etiket-btn:hover { background: var(--surface2); border-color: var(--text-muted); }
    .etiket-btn.aktif { background: rgba(88, 166, 255, 0.15); border-color: var(--accent); color: var(--accent); }

    .yz-secim.aktif { background: rgba(63, 185, 80, 0.12); border-color: var(--green); color: var(--green); }

    #baglantiTestPaneli { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 8px 16px; font-size: 13px; display: none; }
    #baglantiTestSonuclari { display: flex; flex-wrap: wrap; gap: 8px; }
    #baglantiTestSonuclari span { padding: 3px 10px; border-radius: 6px; font-size: 12px; }

    @media (max-width: 600px) {
      .header-logo { font-size: 18px; }
      .header-version { font-size: 10px; }
      .message { max-width: 95%; font-size: 14px; }
      .input-row textarea { font-size: 14px; min-height: 40px; }
      .btn-gonder { padding: 8px 14px; height: 44px; font-size: 14px; }
      .etiket-btn { font-size: 11px; padding: 2px 10px; }
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .yz-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .yz-badge.gemini { background: rgba(88, 166, 255, 0.15); color: #58a6ff; }
    .yz-badge.groq { background: rgba(163, 113, 247, 0.15); color: #a371f7; }
    .yz-badge.deepseek { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .yz-badge.openrouter { background: rgba(210, 153, 34, 0.15); color: #d29922; }
    .yz-badge.mistral { background: rgba(248, 81, 73, 0.15); color: #f85149; }
    .yz-badge.ozel { background: rgba(163, 113, 247, 0.15); color: #a371f7; }
    .yz-badge.otomatik { background: rgba(139, 148, 158, 0.15); color: #8b949e; }

    .yz-gecis-uyarisi {
      font-size: 11px;
      color: #f85149;
      margin-bottom: 8px;
      padding: 4px 8px;
      background: rgba(248, 81, 73, 0.08);
      border-radius: 6px;
      border: 1px solid rgba(248, 81, 73, 0.2);
    }
  </style>
</head>
<body>

  <!-- ✅ MADDE 1: GİRİŞ VE STATE LOCK (ŞİFRE MODAL'I) -->
  <div id="sifreModal" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border,#30363d);border-radius:14px;padding:32px;width:min(360px,90vw);text-align:center;">
      <div style="font-size:32px;margin-bottom:12px;">🔐</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text);">Blueprint Sistemi</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">Erişim için şifre girin</div>
      <input id="sifreInput" type="password" placeholder="Şifre" style="width:100%;background:var(--surface2);border:1px solid var(--border,#30363d);border-radius:8px;padding:10px 14px;color:var(--text);font-size:15px;margin-bottom:12px;outline:none;box-sizing:border-box;" />
      <div id="sifreHata" style="color:var(--red);font-size:12px;margin-bottom:12px;display:none;">❌ Şifre hatalı</div>
      <button id="sifreGirisBtn" style="width:100%;background:var(--accent);color:#0b0e11;border:none;border-radius:8px;padding:10px;font-size:15px;font-weight:600;cursor:pointer;">Giriş Yap</button>
    </div>
  </div>

  <!-- ✅ MADDE 2: Uygulamanın geri kalanı, şifre doğrulanana kadar gizli tutulur -->
  <!-- ✅ ÖNEMLİ: display:none yerine display:flex kullanılıyor (JS'te de öyle açılır).
       Bunun nedeni: body zaten flex-column; bu div block kalırsa header/chat-area/
       input-area normal akışta üst üste yığılır, chat-area'nın flex:1 kuralı işe
       yaramaz ve sohbet uzadıkça TÜM sayfa aşağı kayar, input alanı ekran dışına
       taşar. flex + height:100% + overflow:hidden ile bu div de body gibi davranır:
       sadece #chatArea içeride scroll olur, header ve input-area sabit kalır. -->
  <div id="uygulamaGovdesi" style="display:none; flex-direction:column; height:100%; overflow:hidden;">

  <header class="header">
    <div class="header-left">
      <span class="header-logo">🧠 BP</span>
      <span class="header-version">v6</span>
    </div>
    <div class="header-status">
      <div id="driveIslemleriDropdown" style="position:relative;display:inline-block;">
        <button id="driveIslemleriBtn" type="button" title="YZ'ye bağlanmadan Drive üzerinde işlem yap" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">🗂️ Drive İşlemleri ▼</button>
        <div id="driveIslemleriMenu" style="display:none;position:absolute;left:0;top:110%;background:var(--surface);border:1px solid var(--border,#30363d);border-radius:8px;padding:6px;min-width:220px;z-index:150;box-shadow:0 8px 24px rgba(0,0,0,0.4);">
          <button type="button" class="drive-islem-secenek" data-islem="dosya-sec" style="display:flex;width:100%;text-align:left;align-items:center;gap:8px;padding:8px 10px;background:none;border:none;color:var(--text);font-size:13px;cursor:pointer;border-radius:6px;">📁 Dosya Seç / Ekle</button>
          <button type="button" class="drive-islem-secenek" data-islem="yapi-denetle" style="display:flex;width:100%;text-align:left;align-items:center;gap:8px;padding:8px 10px;background:none;border:none;color:var(--text);font-size:13px;cursor:pointer;border-radius:6px;">🔍 Klasör Yapısını Denetle</button>
        </div>
      </div>
      <button id="baglantiTestBtn" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">🔗 Bağlantı Test</button>
      <button id="konularBtn" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">📋 ARGE / ÖZEL</button>
      <button id="dashboardBtn" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">📊 Dashboard</button>
      <button id="yzBaglanBtn" title="Yapay Zeka motorunu etkinleştir" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">🤖 YZ Bağlan</button>
      <button id="acilisRaporuBtn" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">📋 Açılış Raporu</button>
      <span class="status-dot online" id="statusDot"></span>
      <span id="statusText" style="font-size:13px; color:var(--text-muted);">Bağlantı Kuruluyor...</span>
    </div>
  </header>

  <div id="driveDenetlePanel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:998; align-items:center; justify-content:center;">
    <div style="background:#1c2333; border:1px solid #30363d; border-radius:14px; width:min(560px,94vw); max-height:85vh; display:flex; flex-direction:column; overflow:hidden;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #30363d;">
        <strong style="font-size:14px;">🗂️ Drive Klasör/Dosya Yapısı Denetimi</strong>
        <button id="driveDenetleKapatBtn" style="background:none; border:none; color:#8b949e; font-size:18px; cursor:pointer;">✕</button>
      </div>
      <div id="driveDenetleIcerik" style="overflow-y:auto; padding:14px 18px; flex:1; font-size:13px; line-height:1.8;"></div>
    </div>
  </div>

  <div id="baglantiTestPaneli">
    <div id="baglantiTestSonuclari"></div>
  </div>

  <div id="acilisRaporuModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:998; align-items:center; justify-content:center;">
    <div style="background:#1c2333; border:1px solid #30363d; border-radius:14px; width:min(580px,94vw); max-height:85vh; display:flex; flex-direction:column; overflow:hidden;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #30363d;">
        <strong style="font-size:15px;">📋 Son Durum Raporu</strong>
        <button id="acilisRaporuKapatBtn" style="background:none; border:none; color:#8b949e; font-size:18px; cursor:pointer;">✕</button>
      </div>
      <div id="acilisRaporuIcerik" style="overflow-y:auto; padding:14px 18px; flex:1; font-size:13px; line-height:1.7;"></div>
      <div style="padding:10px 18px; border-top:1px solid #30363d; display:flex; justify-content:flex-end; gap:8px;">
        <button id="acilisRaporuKapatBtn2" style="padding:7px 18px; border-radius:7px; border:1px solid #30363d; background:transparent; color:#8b949e; cursor:pointer;">Kapat</button>
        <button id="acilisRaporuDevamBtn" style="padding:7px 18px; border-radius:7px; border:none; background:#58a6ff; color:#0b0e11; font-weight:600; cursor:pointer;">Devam Et →</button>
      </div>
    </div>
  </div>

  <div id="dashboardModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:997; align-items:center; justify-content:center;">
    <div style="background:#1c2333; border:1px solid #30363d; border-radius:14px; width:min(500px,94vw); max-height:80vh; display:flex; flex-direction:column; overflow:hidden;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #30363d;">
        <strong style="font-size:15px;">📊 Oturum Dashboard'u</strong>
        <button id="dashboardKapatBtn" style="background:none; border:none; color:#8b949e; font-size:18px; cursor:pointer;">✕</button>
      </div>
      <div id="dashboardIcerik" style="overflow-y:auto; padding:14px 18px; flex:1; font-size:13px; line-height:1.7;"></div>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="etiket-bar" id="etiketBar">
      <button class="etiket-btn" data-etiket="#ekle">➕ #ekle</button>
      <button class="etiket-btn" data-etiket="#sorun">⚠️ #sorun</button>
      <button class="etiket-btn" data-etiket="#karar">✅ #karar</button>
      <button class="etiket-btn" data-etiket="#arge">💡 #arge</button>
      <button class="etiket-btn" data-etiket="#ref">🔗 #ref</button>
      <button class="etiket-btn" data-etiket="#konu">💬 #konu</button>
      <!-- ✅ MADDE 4: paralelToggleBtn kaldırıldı, yerine akordeon/dropdown YZ seçimi geldi -->
      <div id="yzDropdown" style="position:relative;display:inline-block;margin-left:auto;">
        <button id="yzDropdownBtn" class="etiket-btn" type="button">🤖 5 YZ Seçili ▼</button>
        <div id="yzDropdownMenu" style="display:none;position:absolute;right:0;top:110%;background:var(--surface);border:1px solid var(--border,#30363d);border-radius:8px;padding:8px;min-width:190px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4);">
          <label style="display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--text);">
            <input type="checkbox" id="yzHepsiniSec" checked> Hepsini Seç
          </label>
          <hr style="border:0;border-top:1px solid var(--border,#30363d);margin:6px 0;">
          <label style="display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--text);"><input type="checkbox" class="yz-check" data-yz="gemini" checked> Gemini 2.5 Flash</label>
          <label style="display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--text);"><input type="checkbox" class="yz-check" data-yz="groq" checked> Groq GPT-OSS</label>
          <label style="display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--text);"><input type="checkbox" class="yz-check" data-yz="deepseek" checked> DeepSeek Chat</label>
          <label style="display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--text);"><input type="checkbox" class="yz-check" data-yz="openrouter" checked> OpenRouter Llama</label>
          <label style="display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--text);"><input type="checkbox" class="yz-check" data-yz="mistral" checked> Mistral Small</label>
        </div>
      </div>
    </div>

    <div id="driveSeciliDosyalar" style="display:none; padding:6px 16px; flex-wrap:wrap; gap:6px; font-size:12px;"></div>

    <div id="drivePanel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
      <div style="background:var(--bg-primary,#111); border:1px solid var(--border,#333); border-radius:12px; width:min(560px,92vw); max-height:80vh; display:flex; flex-direction:column; overflow:hidden;">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border,#333);">
          <strong id="drivePanelBaslik" style="font-size:14px;">📁 Drive'dan Dosya Seç</strong>
          <button id="drivePanelKapatBtn" style="background:none; border:none; color:var(--text-muted); font-size:18px; cursor:pointer;">✕</button>
        </div>
        <div id="drivePanelIcerik" style="overflow-y:auto; padding:8px 16px; flex:1;">

    function uuid() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function mesajEkle(icerik, rol, etiketler, meta) {

      // ✅ MADDE 5 — Seç / Sil / Düzenle olay dinleyicileri
      if (rol === 'yz') {
        const secCheck = div.querySelector('.yz-sec-check');
        if (secCheck) {
