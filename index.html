<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧠 Blueprint Asistanı v5</title>
  <style>
    /* ===== RESET & VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0e11;
      --surface: #161b22;
      --surface2: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      min-height: 56px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a371f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-version {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.online {
      background: var(--green);
      box-shadow: 0 0 8px rgba(63, 185, 80, 0.4);
    }

    .status-dot.offline {
      background: var(--red);
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar {
      width: 6px;
    }

    .chat-area::-webkit-scrollbar-track {
      background: var(--bg);
    }

    .chat-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }

    .message {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.6;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
      border-left: 3px solid #58a6ff; 
    }

    .message.yz {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      border-left: 3px solid #3fb950;  
    }

    .message .meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .message .etiket {
      font-size: 11px;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      padding: 1px 8px;
      border-radius: 12px;
      border: 1px solid rgba(88, 166, 255, 0.2);
    }

    .message .etiket.karar { background: rgba(63, 185, 80, 0.15); color: var(--green); border-color: rgba(63, 185, 80, 0.2); }
    .message .etiket.sorun { background: rgba(248, 81, 73, 0.15); color: var(--red); border-color: rgba(248, 81, 73, 0.2); }
    .message .etiket.ekle { background: rgba(210, 153, 34, 0.15); color: var(--orange); border-color: rgba(210, 153, 34, 0.2); }
    .message .etiket.arge { background: rgba(163, 113, 247, 0.15); color: #a371f7; border-color: rgba(163, 113, 247, 0.2); }

    .message.system {
      align-self: center;
      background: var(--surface2);
      border: 1px dashed var(--border);
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      max-width: 95%;
    }

    .onay-container {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .btn-onay {
      padding: 6px 18px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-onay.evet { background: var(--green); color: #0b0e11; }
    .btn-onay.evet:hover { opacity: 0.85; }
    .btn-onay.hayir { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-onay.hayir:hover { background: var(--border); }

    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    .input-row textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border 0.2s;
      min-height: 48px;
      max-height: 120px;
      line-height: 1.5;
    }

    .input-row textarea:focus { border-color: var(--accent); }
    .input-row textarea::placeholder { color: var(--text-muted); }

    .btn-gonder {
      background: var(--accent);
      color: #0b0e11;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-gonder:hover { background: var(--accent-hover); transform: scale(1.02); }
    .btn-gonder:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .etiket-bar { display: flex; gap: 6px; flex-wrap: wrap; }

    .etiket-btn {
      font-size: 12px;
      padding: 3px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: 0.2s;
    }

    .etiket-btn:hover { background: var(--surface2); border-color: var(--text-muted); }
    .etiket-btn.aktif { background: rgba(88, 166, 255, 0.15); border-color: var(--accent); color: var(--accent); }

    #paralelToggleBtn.aktif { background: rgba(163, 113, 247, 0.18); border-color: #a371f7; color: #a371f7; font-weight: 600; }
    .yz-secim.aktif { background: rgba(63, 185, 80, 0.12); border-color: var(--green); color: var(--green); }

    #baglantiTestPaneli { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 8px 16px; font-size: 13px; display: none; }
    #baglantiTestSonuclari { display: flex; flex-wrap: wrap; gap: 8px; }
    #baglantiTestSonuclari span { padding: 3px 10px; border-radius: 6px; font-size: 12px; }

    @media (max-width: 600px) {
      .header-logo { font-size: 18px; }
      .header-version { font-size: 10px; }
      .message { max-width: 95%; font-size: 14px; }
      .input-row textarea { font-size: 14px; min-height: 40px; }
      .btn-gonder { padding: 8px 14px; height: 44px; font-size: 14px; }
      .etiket-btn { font-size: 11px; padding: 2px 10px; }
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .yz-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .yz-badge.gemini { background: rgba(88, 166, 255, 0.15); color: #58a6ff; }
    .yz-badge.groq { background: rgba(163, 113, 247, 0.15); color: #a371f7; }
    .yz-badge.deepseek { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .yz-badge.openrouter { background: rgba(210, 153, 34, 0.15); color: #d29922; }
    .yz-badge.mistral { background: rgba(248, 81, 73, 0.15); color: #f85149; }
    .yz-badge.ozel { background: rgba(163, 113, 247, 0.15); color: #a371f7; }
    .yz-badge.otomatik { background: rgba(139, 148, 158, 0.15); color: #8b949e; }

    .yz-gecis-uyarisi {
      font-size: 11px;
      color: #f85149;
      margin-bottom: 8px;
      padding: 4px 8px;
      background: rgba(248, 81, 73, 0.08);
      border-radius: 6px;
      border: 1px solid rgba(248, 81, 73, 0.2);
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <span class="header-logo">🧠 BP</span>
      <span class="header-version">v6</span>
    </div>
    <div class="header-status">
      <button id="baglantiTestBtn" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">🔗 Bağlantı Test</button>
      <button id="konularBtn" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">📋 ARGE / ÖZEL</button>
      <button id="dashboardBtn" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">📊 Dashboard</button>
      <button id="acilisRaporuBtn" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">📋 Açılış Raporu</button>
      <button id="driveDenetleBtn" style="font-size:12px; padding:4px 10px; border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">🗂️ Drive Yapısını Denetle</button>
      <span class="status-dot online" id="statusDot"></span>
      <span id="statusText" style="font-size:13px; color:var(--text-muted);">Bağlantı Kuruluyor...</span>
    </div>
  </header>

  <div id="driveDenetlePanel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:998; align-items:center; justify-content:center;">
    <div style="background:#1c2333; border:1px solid #30363d; border-radius:14px; width:min(560px,94vw); max-height:85vh; display:flex; flex-direction:column; overflow:hidden;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #30363d;">
        <strong style="font-size:14px;">🗂️ Drive Klasör/Dosya Yapısı Denetimi</strong>
        <button id="driveDenetleKapatBtn" style="background:none; border:none; color:#8b949e; font-size:18px; cursor:pointer;">✕</button>
      </div>
      <div id="driveDenetleIcerik" style="overflow-y:auto; padding:14px 18px; flex:1; font-size:13px; line-height:1.8;"></div>
    </div>
  </div>

  <div id="baglantiTestPaneli">
    <div id="baglantiTestSonuclari"></div>
  </div>

  <div id="acilisRaporuModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:998; align-items:center; justify-content:center;">
    <div style="background:#1c2333; border:1px solid #30363d; border-radius:14px; width:min(580px,94vw); max-height:85vh; display:flex; flex-direction:column; overflow:hidden;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #30363d;">
        <strong style="font-size:15px;">📋 Son Durum Raporu</strong>
        <button id="acilisRaporuKapatBtn" style="background:none; border:none; color:#8b949e; font-size:18px; cursor:pointer;">✕</button>
      </div>
      <div id="acilisRaporuIcerik" style="overflow-y:auto; padding:14px 18px; flex:1; font-size:13px; line-height:1.7;"></div>
      <div style="padding:10px 18px; border-top:1px solid #30363d; display:flex; justify-content:flex-end; gap:8px;">
        <button id="acilisRaporuKapatBtn2" style="padding:7px 18px; border-radius:7px; border:1px solid #30363d; background:transparent; color:#8b949e; cursor:pointer;">Kapat</button>
        <button id="acilisRaporuDevamBtn" style="padding:7px 18px; border-radius:7px; border:none; background:#58a6ff; color:#0b0e11; font-weight:600; cursor:pointer;">Devam Et →</button>
      </div>
    </div>
  </div>

  <div id="dashboardModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:997; align-items:center; justify-content:center;">
    <div style="background:#1c2333; border:1px solid #30363d; border-radius:14px; width:min(500px,94vw); max-height:80vh; display:flex; flex-direction:column; overflow:hidden;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #30363d;">
        <strong style="font-size:15px;">📊 Oturum Dashboard'u</strong>
        <button id="dashboardKapatBtn" style="background:none; border:none; color:#8b949e; font-size:18px; cursor:pointer;">✕</button>
      </div>
      <div id="dashboardIcerik" style="overflow-y:auto; padding:14px 18px; flex:1; font-size:13px; line-height:1.7;"></div>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="etiket-bar" id="etiketBar">
      <button class="etiket-btn" data-etiket="#ekle">➕ #ekle</button>
      <button class="etiket-btn" data-etiket="#sorun">⚠️ #sorun</button>
      <button class="etiket-btn" data-etiket="#karar">✅ #karar</button>
      <button class="etiket-btn" data-etiket="#arge">💡 #arge</button>
      <button class="etiket-btn" data-etiket="#ref">🔗 #ref</button>
      <button class="etiket-btn" data-etiket="#konu">💬 #konu</button>
      <button class="etiket-btn" id="paralelToggleBtn" style="margin-left:auto;" title="Bu mesajı 5 YZ'ye birden gönder">🧠×5 Paralel Sor</button>
    </div>

    <div class="etiket-bar" id="yzSecimBar" style="display:none;">
      <span style="font-size:11px;color:var(--text-muted);align-self:center;margin-right:4px;">Hedef YZ'ler (tık: tek seç · CTRL+tık: çoklu seç):</span>
      <button class="etiket-btn yz-secim aktif" data-yz="gemini">Gemini</button>
      <button class="etiket-btn yz-secim aktif" data-yz="groq">Groq</button>
      <button class="etiket-btn yz-secim aktif" data-yz="deepseek">DeepSeek</button>
      <button class="etiket-btn yz-secim aktif" data-yz="openrouter">OpenRouter</button>
      <button class="etiket-btn yz-secim aktif" data-yz="mistral">Mistral</button>
    </div>

    <div id="driveSeciliDosyalar" style="display:none; padding:6px 16px; flex-wrap:wrap; gap:6px; font-size:12px;"></div>

    <div id="drivePanel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
      <div style="background:var(--bg-primary,#111); border:1px solid var(--border,#333); border-radius:12px; width:min(560px,92vw); max-height:80vh; display:flex; flex-direction:column; overflow:hidden;">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border,#333);">
          <strong id="drivePanelBaslik" style="font-size:14px;">📁 Drive'dan Dosya Seç</strong>
          <button id="drivePanelKapatBtn" style="background:none; border:none; color:var(--text-muted); font-size:18px; cursor:pointer;">✕</button>
        </div>
        <div id="drivePanelIcerik" style="overflow-y:auto; padding:8px 16px; flex:1;">
          <div style="color:var(--text-muted); font-size:13px;">🔄 Yükleniyor...</div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px; padding:10px 16px; border-top:1px solid var(--border,#333);">
          <button id="driveEkleBtn" style="padding:6px 14px; border-radius:8px; border:none; background:var(--accent,#3b82f6); color:#fff; cursor:pointer;">Seçilenleri Ekle</button>
        </div>
      </div>
    </div>

    <div id="konularPanel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
      <div style="background:var(--bg-primary,#111); border:1px solid var(--border,#333); border-radius:12px; width:min(600px,92vw); max-height:82vh; display:flex; flex-direction:column; overflow:hidden;">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border,#333);">
          <strong style="font-size:14px;">📋 ARGE / ÖZEL Konuları</strong>
          <button id="konularPanelKapatBtn" style="background:none; border:none; color:var(--text-muted); font-size:18px; cursor:pointer;">✕</button>
        </div>
        <div style="display:flex; gap:6px; padding:8px 16px; border-bottom:1px solid var(--border,#333);">
          <button class="etiket-btn konu-filtre aktif" data-tip="">Tümü</button>
          <button class="etiket-btn konu-filtre" data-tip="arge">💡 ARGE</button>
          <button class="etiket-btn konu-filtre" data-tip="ozel">🔒 ÖZEL</button>
        </div>
        <div id="konularPanelIcerik" style="overflow-y:auto; padding:8px 16px; flex:1;">
          <div style="color:var(--text-muted); font-size:13px;">🔄 Yükleniyor...</div>
        </div>
      </div>
    </div>

    <div class="input-row">
      <button id="driveSecBtn" title="Drive'dan dosya seç (yükleme değil)" style="border-radius:8px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer; padding:0 12px;">📁</button>
      <textarea id="messageInput" rows="1" placeholder="Mesajınızı yazın... (etiket seçin veya yazın)"></textarea>
      <button class="btn-gonder" id="sendBtn">
        <span>Gönder</span>
        <span style="font-size:18px;">📤</span>
      </button>
    </div>

    <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); padding:0 4px;">
      <span id="counterDisplay">🔄 Tur: 0 / 8</span>
      <span id="oturumDisplay">📋 Oturum: —</span>
    </div>
  </div>

  <script>
    // ============================================================
    // KONFIGÜRASYON
    // ============================================================
    const CONFIG = {
      APP_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzy_kKJypVCSmwNLwdxmOq_02em4Teo98NBRm5AYXKoukUIp7LIgeuTYvE44twYPJba/exec", 
      ERISIM_SIFRESI: "blueprint2026",
      MAX_TUR: 8,
      COT_MODU: false,
    };

    // ============================================================
    // STATE
    // ============================================================
    let state = {
      oturumId: null,
      turSayaci: 0,
      sohbetGecmisi: [],
      aktifEtiket: null,
      isProcessing: false,
      paralelModAcik: false,
      seciliYzler: ['gemini', 'groq', 'deepseek', 'openrouter', 'mistral'],
      driveSeciliDosyalar: [],
      driveGezinmeYigin: [null],
      aktifKonuId: null,
      mesajNo: 0, 
    };

    // ============================================================
    // DOM REFS
    // ============================================================
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const counterDisplay = document.getElementById('counterDisplay');
    const oturumDisplay = document.getElementById('oturumDisplay');
    const etiketBar = document.getElementById('etiketBar');
    const paralelToggleBtn = document.getElementById('paralelToggleBtn');
    const yzSecimBar = document.getElementById('yzSecimBar');
    const driveSecBtn = document.getElementById('driveSecBtn');
    const drivePanel = document.getElementById('drivePanel');
    const drivePanelIcerik = document.getElementById('drivePanelIcerik');
    const drivePanelBaslik = document.getElementById('drivePanelBaslik');
    const drivePanelKapatBtn = document.getElementById('drivePanelKapatBtn');
    const driveEkleBtn = document.getElementById('driveEkleBtn');
    const driveSeciliDosyalarDiv = document.getElementById('driveSeciliDosyalar');
    const konularBtn = document.getElementById('konularBtn');
    const konularPanel = document.getElementById('konularPanel');
    const konularPanelIcerik = document.getElementById('konularPanelIcerik');
    const konularPanelKapatBtn = document.getElementById('konularPanelKapatBtn');
    const baglantiTestBtn = document.getElementById('baglantiTestBtn');
    const baglantiTestPaneli = document.getElementById('baglantiTestPaneli');
    const baglantiTestSonuclari = document.getElementById('baglantiTestSonuclari');

    // ============================================================
    // YARDIMCILAR
    // ============================================================
    function uuid() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function formatTarih() {
      return new Date().toLocaleString('tr-TR', {
        hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric'
      });

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ============================================================
    // ✅ KRİTİK YAMA: APPS SCRIPT İLETİŞİM (Simple Request & CORS Fix)
    // ============================================================
    // ============================================================
    // APPS SCRIPT İLETİŞİM KATMANI
    // ============================================================
    // ✅ ÇÖZÜM: fetch() yerine google.script.run kullanılıyor.
    //
    // Neden fetch() çalışmıyordu:
    //   Türkiye mobil ağlarında tarayıcı içinden script.google.com'a
    //   yapılan JavaScript fetch() istekleri DNS çözümlemesinde
    //   ERR_NAME_NOT_RESOLVED hatası alıyor. Sayfa yükleniyor (doGet)
    //   ama JS'ten ayrı HTTP isteği atılamıyor.
    //
    // Neden google.script.run çalışır:
    //   google.script.run Apps Script'in HTML sayfaları için sunduğu
    //   YERLEŞİK iletişim yöntemidir. Tarayıcıdan dışarıya HTTP isteği
    //   ATMAZ — sayfa zaten script.google.com içinde olduğu için
    //   direkt sunucu tarafındaki fonksiyonu çağırır. DNS sorunu yok.
    //
    // Nasıl çalışır:
    //   google.script.run
    //     .withSuccessHandler(fn)   // başarıda çağrılacak callback
    //     .withFailureHandler(fn)   // hata olursa çağrılacak callback
    //     .sunucuFonksiyonu(arg)    // Code.gs'teki public fonksiyon
    //
    // Biz bunu Promise'e sarıyoruz ki async/await ile kullanılabilsin.
    // Code.gs'e tek bir köprü fonksiyonu ekliyoruz: htmlKoprusu(payload)
    // Bu fonksiyon JSON string alır, doPost'un switch'ini çağırır,
    // JSON string döndürür. Böylece mevcut tüm kod değişmeden çalışır.

    function appScriptIstek(tip, veri) {
      veri = veri || {};
      const payload = {
        tip: tip,
        sifre: CONFIG.ERISIM_SIFRESI,
        ...veri,
        oturum_id: state.oturumId,
      };

      return new Promise(function(resolve, reject) {
        google.script.run
          .withSuccessHandler(function(jsonStr) {
            try {
              const sonuc = JSON.parse(jsonStr);
              resolve(sonuc);
            } catch(e) {
              reject(new Error('Sunucu geçersiz JSON döndürdü: ' + jsonStr.slice(0, 100)));
            }
          })
          .withFailureHandler(function(hata) {
            reject(new Error(hata.message || String(hata)));
          })
          .htmlKoprusu(JSON.stringify(payload));
      });
    }

    async function driveKlasoruAc(klasorId) {
      drivePanelIcerik.innerHTML = '<div style="color:var(--text-muted); font-size:13px;">🔄 Yükleniyor...</div>';
      try {
        const sonuc = await appScriptIstek('drive_gezin', { klasorId: klasorId });
        if (!sonuc.basarili) {
          drivePanelIcerik.innerHTML = '<div style="color:#ef4444; font-size:13px;">❌ ' + (sonuc.hata || 'Klasör okunamadı') + '</div>';
          return;
        }
        drivePanelBaslik.textContent = '📁 ' + sonuc.klasorAdi;
        drivePanel.dataset.klasorId = sonuc.klasorId;
        drivePanel.dataset.ustKlasorId = sonuc.ustKlasorId || '';

        let html = '';
        if (sonuc.ustKlasorId) html += '<div class="drive-item drive-ust" style="padding:8px 6px; cursor:pointer; border-bottom:1px solid var(--border,#333); color:var(--text-muted);">⬆️ .. (üst klasöre dön)</div>';
        
        sonuc.altKlasorler.forEach(function(k) {
          html += '<div class="drive-item drive-klasor" data-id="' + k.id + '" style="padding:8px 6px; cursor:pointer; border-bottom:1px solid var(--border,#222);">📁 ' + k.ad + '</div>';
        });
        sonuc.dosyalar.forEach(function(f) {
          const secili = drivePanelGeciciSecim.some(function(s) { return s.id === f.id; });
          html += '<div class="drive-item drive-dosya" data-id="' + f.id + '" data-ad="' + f.ad.replace(/"/g, '&quot;') + '" style="padding:8px 6px; cursor:pointer; border-bottom:1px solid var(--border,#222); display:flex; justify-content:space-between; ' + (secili ? 'background:rgba(59,130,246,0.15);' : '') + '"><span>📄 ' + f.ad + ' <span style="color:var(--text-muted); font-size:11px;">(' + f.boyutKB + ' KB)</span></span><span>' + (secili ? '✅' : '') + '</span></div>';
        });
        if (!sonuc.altKlasorler.length && !sonuc.dosyalar.length) {
          html += '<div style="color:var(--text-muted); font-size:13px; padding:8px 6px;">Bu klasör boş.</div>';
        }
        drivePanelIcerik.innerHTML = html;

        const ustEl = drivePanelIcerik.querySelector('.drive-ust');
        if (ustEl) ustEl.addEventListener('click', function() { driveKlasoruAc(drivePanel.dataset.ustKlasorId || null); });

        drivePanelIcerik.querySelectorAll('.drive-klasor').forEach(function(el) {
          el.addEventListener('click', function() { driveKlasoruAc(this.dataset.id); });
        });

        drivePanelIcerik.querySelectorAll('.drive-dosya').forEach(function(el) {
          el.addEventListener('click', function() {
            const id = this.dataset.id, ad = this.dataset.ad;
            const idx = drivePanelGeciciSecim.findIndex(function(s) { return s.id === id; });
            if (idx === -1) drivePanelGeciciSecim.push({ id: id, ad: ad });
            else drivePanelGeciciSecim.splice(idx, 1);
            driveKlasoruAc(drivePanel.dataset.klasorId);
          });
        });
      } catch (err) {
        drivePanelIcerik.innerHTML = '<div style="color:#ef4444; font-size:13px;">❌ ' + err.message + '</div>';
      }
    }

    const _modalEl = document.createElement('div');
    _modalEl.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:9999;align-items:center;justify-content:center;';
    document.body.appendChild(_modalEl);

    function _modalKapat() { _modalEl.style.display = 'none'; _modalEl.innerHTML = ''; }

    function modalSor(baslik, aciklama, varsayilan) {
      return new Promise(function(resolve) {
        _modalEl.style.display = 'flex';
        _modalEl.innerHTML = '<div style="background:#1c2333;border:1px solid #30363d;border-radius:12px;padding:20px 22px;width:min(420px,90vw);">' +
          '<div style="font-size:14px;font-weight:600;margin-bottom:6px;">' + baslik + '</div>' +
          (aciklama ? '<div style="font-size:12px;color:#8b949e;margin-bottom:10px;">' + aciklama + '</div>' : '') +
          '<input id="_modalInput" type="text" value="' + escapeHtml(varsayilan || '') + '" style="width:100%;background:#0b0e11;border:1px solid #30363d;border-radius:6px;padding:8px 10px;color:#e6edf3;font-size:13px;outline:none;" />' +
          '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">' +
            '<button id="_modalIptal" style="padding:7px 14px;border-radius:7px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;">İptal</button>' +
            '<button id="_modalOk" style="padding:7px 14px;border-radius:7px;border:none;background:#58a6ff;color:#0b0e11;font-weight:600;cursor:pointer;">Tamam</button>' +
          '</div></div>';
        const inp = document.getElementById('_modalInput');
        inp.focus(); inp.select();
        function tamam() { _modalKapat(); resolve(inp.value); }
        function iptal() { _modalKapat(); resolve(null); }
        document.getElementById('_modalOk').addEventListener('click', tamam);
        document.getElementById('_modalIptal').addEventListener('click', iptal);
        inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') tamam(); if (e.key === 'Escape') iptal(); });
      });
    }

    function modalOnayla(baslik, aciklama) {
      return new Promise(function(resolve) {
        _modalEl.style.display = 'flex';
        _modalEl.innerHTML = '<div style="background:#1c2333;border:1px solid #30363d;border-radius:12px;padding:20px 22px;width:min(380px,90vw);">' +
          '<div style="font-size:14px;font-weight:600;margin-bottom:6px;">' + baslik + '</div>' +
          (aciklama ? '<div style="font-size:12px;color:#8b949e;margin-bottom:14px;">' + aciklama + '</div>' : '') +
          '<div style="display:flex;gap:8px;justify-content:flex-end;"><button id="_modalIptal" style="padding:7px 14px;border-radius:7px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;">Hayır</button><button id="_modalOk" style="padding:7px 14px;border-radius:7px;border:none;background:#f85149;color:#fff;font-weight:600;cursor:pointer;">Evet, Sil</button></div></div>';
        document.getElementById('_modalOk').addEventListener('click', function() { _modalKapat(); resolve(true); });
        document.getElementById('_modalIptal').addEventListener('click', function() { _modalKapat(); resolve(false); });
      });
    }

    function modalSec(baslik, secenekler) {
      return new Promise(function(resolve) {
        _modalEl.style.display = 'flex';
        const butonlar = Object.entries(secenekler).map(function(e) {
          return '<button class="_modalSecBtn" data-val="' + e[0] + '" style="display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;border-radius:7px;border:1px solid #30363d;background:#0b0e11;color:#e6edf3;cursor:pointer;">' + e[1] + '</button>';
        }).join('');
        _modalEl.innerHTML = '<div style="background:#1c2333;border:1px solid #30363d;border-radius:12px;padding:20px 22px;width:min(360px,90vw);"><div style="font-size:14px;font-weight:600;margin-bottom:12px;">' + baslik + '</div>' + butonlar + '<button id="_modalIptal" style="width:100%;padding:7px;border-radius:7px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;margin-top:4px;">İptal</button></div>';
        _modalEl.querySelectorAll('._modalSecBtn').forEach(function(b) {

    }

      try {
        const sonuc = await appScriptIstek('konu_listele', { konuTipi: konularAktifFiltre || null });

          return '<div style="padding:10px 0; border-bottom:1px solid var(--border,#222);"><div style="font-weight:600;">' + ikon + ' ' + k.id + ': ' + k.baslik + '</div><div style="font-size:11px; color:var(--text-muted); margin:4px 0;">📅 Açılış: ' + k.acilis + ' · 🔄 Son: ' + k.sonGuncelleme + ' · 💬 ' + (k.mesajSayisi || 0) + ' mesaj · ' + durumEtiketi + '</div>' +
            (k.durum === 'acik' ? ('<div style="display:flex; gap:6px; margin-top:6px;"><button class="konu-devam" data-id="' + k.id + '" data-tip="' + k.tip + '" style="font-size:12px; padding:3px 10px; border-radius:6px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">▶️ Devam Et</button>' + (k.tip === 'arge' ? '<button class="konu-kapat" data-id="' + k.id + '" style="font-size:12px; padding:3px 10px; border-radius:6px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">✅ Kapat</button>' : '') + '<button class="konu-sil" data-id="' + k.id + '" style="font-size:12px; padding:3px 10px; border-radius:6px; border:1px solid #7f1d1d; background:transparent; color:#fca5a5; cursor:pointer;">🗑️ Sil</button></div>') : ('<button class="konu-sil" data-id="' + k.id + '" style="font-size:12px; padding:3px 10px; border-radius:6px; border:1px solid #7f1d1d; background:transparent; color:#fca5a5; cursor:pointer;">🗑️ Sil</button>')) + '</div>';

        konularPanelIcerik.querySelectorAll('.konu-devam').forEach(function(btn) {

        konularPanelIcerik.querySelectorAll('.konu-kapat').forEach(function(btn) {
          btn.addEventListener('click', async function() {

            const secimNo = await modalSec('ARGE sonucu ne oldu?', { '1': '✅ Karara dönüştü', '2': '❌ İptal', '3': '📝 Beklemede bırak' });
            if (!secimNo) return;
            const sonucTuru = sonucTurleri[secimNo];
            let karMetni = null;
            if (sonucTuru === 'karara_donustu') {
              karMetni = await modalSor('Karar ne oldu?', 'Boş bırakırsan ARGE başlığı kullanılır.');

            const r = await appScriptIstek('konu_kapat', { konuId: this.dataset.id, sonuc: sonucTuru, karMetni: karMetni });
            if (r.basarili) {
              if (state.aktifKonuId === this.dataset.id) state.aktifKonuId = null;

    // ============================================================
    // MESAJ GÖNDER
    // ============================================================
    async function mesajGonder() {
      if (state.isProcessing) return;

      const metin = messageInput.value.trim();
      if (!metin) return;

      if (state.paralelModAcik) {
        return paralelSorGonder(metin);
      }

      let etiketler = etiketleriBul(metin);
      if (state.aktifEtiket && !etiketler.includes(state.aktifEtiket)) {
        etiketler.push(state.aktifEtiket);
        if (!metin.includes(state.aktifEtiket)) {
          messageInput.value = metin + ' ' + state.aktifEtiket;
        }
      }

      const sonMetin = messageInput.value.trim();
      const sonEtiketler = etiketleriBul(sonMetin);
      const mesaj = sonMetin;
      const gonderilecekDosyalar = state.driveSeciliDosyalar.slice();

      let konuBaslikGirdisi = null;
      if (sonEtiketler.includes('#arge') && !state.aktifKonuId) {
        konuBaslikGirdisi = await modalSor('Yeni ARGE konusu', 'Kısa bir başlık ver — ileride "ARGE-003: Redis caching" gibi listede görünecek.\nBoş bırakırsan mesajın ilk 50 karakteri kullanılır.', '');
        if (konuBaslikGirdisi === null) konuBaslikGirdisi = '';
      }

      let ozelBaslikGirdisi = null;
      if (sonMetin.trim() === '#özel' || sonMetin.trim() === '#ozel') {
        ozelBaslikGirdisi = await modalSor('Özel kanal başlığı', 'Bu sohbet Drive\'a kaydedilmeyecek. Listede görünmesi için bir başlık ver.\nÖrn: "İş görüşmesi", "Kişisel not"', '');
        if (ozelBaslikGirdisi === null) ozelBaslikGirdisi = '';
      }

      messageInput.value = '';
      messageInput.style.height = 'auto';
      state.isProcessing = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span> Gönderiliyor...';

      state.mesajNo++;
      const buTurNumarasi = state.mesajNo;

      mesajEkle(mesaj, 'user', sonEtiketler, {
        tarih: formatTarih(),
        driveDosyalari: gonderilecekDosyalar.map(function(d) { return d.ad; }),
        mesajNo: buTurNumarasi,
      });
      state.sohbetGecmisi.push({ role: 'user', content: mesaj, etiketler: sonEtiketler });

      try {
        setStatus(true, 'YZ düşünüyor...');

        const sonuc = await appScriptIstek('mesaj', {
          kullanici_mesaji: mesaj,
          etiketler: sonEtiketler,
          sohbet_gecmisi: state.sohbetGecmisi,
          cot_modu: CONFIG.COT_MODU,
          drive_dosyalari: gonderilecekDosyalar.map(function(d) { return d.id; }),
          aktif_konu_id: state.aktifKonuId,
          konu_baslik: konuBaslikGirdisi,
          ozel_baslik: ozelBaslikGirdisi,
        });

        state.driveSeciliDosyalar = [];
        driveSeciliDosyalariRenderEt();

        if (sonuc.arge_konu && sonuc.arge_konu.id) {
          state.aktifKonuId = sonuc.arge_konu.id;
          sistemMesaji('💡 ' + sonuc.arge_konu.id + ' aktif konu: "' + sonuc.arge_konu.baslik + '"');
        } else if (!sonEtiketler.includes('#arge') && !sonuc.ozel_kanal) {
          state.aktifKonuId = null;
        }
        if (sonuc.aktif_konu_id !== undefined) {
          state.aktifKonuId = sonuc.aktif_konu_id; 
        }

        if (sonuc.turSayaci !== undefined) {
          state.turSayaci = sonuc.turSayaci;
          updateCounter(state.turSayaci);
        }

        if (sonuc.oturum_id) {
          state.oturumId = sonuc.oturum_id;
          updateOturum(state.oturumId);
        }

        if (sonuc.yz_cevabi) {
          const yzEtiketler = etiketleriBul(sonuc.yz_cevabi);
          var otomatikGecis = sonuc.yz_otomatik_gecis || null;
          var gosterilecekCevap = sonuc.yz_cevabi;

          mesajEkle(gosterilecekCevap, 'yz', yzEtiketler, {
            tarih: formatTarih(),
            onaylandi: sonuc.onaylandi || false,
            originalMessage: mesaj,
            onayId: sonuc.onay_id,
            ozel_kanal: sonuc.ozel_kanal || false,
            yz_adi: sonuc.yz_adi || 'YZ',
            yz_kodu: sonuc.yz_kodu || 'otomatik',
            yz_otomatik_gecis: otomatikGecis,
            mesajNo: buTurNumarasi,
          });
          if (!sonuc.kayit_yapilmadi) {
            state.sohbetGecmisi.push({ role: 'assistant', content: sonuc.yz_cevabi });
          }
          if (CONFIG.COT_MODU && sonuc.cot_kaydedildi) {
            sistemMesaji('🧬 Düşünce zinciri + felsefe 07_YZ_DNA/yz_dna.jsonl\'e kaydedildi.');
          }
        }

        if (sonuc.sentezGerekli) {
          sistemMesaji('🔄 8. tur tamamlandı. Sentez yapılıyor...');
          const sentezSonuc = await appScriptIstek('sentez', {
            sohbet_gecmisi: state.sohbetGecmisi,
          });
          if (sentezSonuc.basarili) {
            sistemMesaji('✅ Sentez tamamlandı ve Drive\'a YAML olarak kaydedildi (03_SENTEZ/sentez_guncel.md).');
            if (sentezSonuc.parse_basarili === false) {
              sistemMesaji('⚠️ YZ\'nin cevabı tam YAML formatında gelmedi — ham metin yedek olarak saklandı, veri kaybolmadı.');
            }
            if (sentezSonuc.sayfa_yenilensin) {
              sistemMesaji('🔁 Pencere 3 saniye içinde yenilenecek — yeni oturum Drive\'dan temiz okunacak...');
              setTimeout(function() { window.location.reload(); }, 3000);
              return;
            }
            state.turSayaci = 0;
            updateCounter(state.turSayaci);
          } else {
            sistemMesaji('❌ Sentez hatası: ' + (sentezSonuc.hata || 'Bilinmeyen'));
          }
        }

        setStatus(true, 'Bağlı');
      } catch (error) {
        console.error(error);
        sistemMesaji('❌ Hata: ' + error.message);
        setStatus(false, 'Bağlantı hatası');
        mesajEkle('Üzgünüm, bir hata oluştu. Lütfen tekrar deneyin.', 'yz', [], { tarih: formatTarih() });
      } finally {
        state.isProcessing = false;
        sendBtn.disabled = false;
        sendBtn.innerHTML = state.paralelModAcik
          ? '<span>5 YZ\'ye Sor</span><span style="font-size:18px;">🧠</span>'
          : '<span>Gönder</span><span style="font-size:18px;">📤</span>';
        messageInput.focus();
      }
    }

    // ============================================================
    // 5-YZ PARALEL SORGU
    // ============================================================
    async function paralelSorGonder(mesaj) {
      if (state.seciliYzler.length === 0) {
        sistemMesaji('⚠️ En az bir YZ seçmelisin.');
        return;
      }

      messageInput.value = '';
      messageInput.style.height = 'auto';
      state.isProcessing = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span> 5 YZ\'ye soruluyor...';

      mesajEkle(mesaj, 'user', [], { tarih: formatTarih() });
      state.sohbetGecmisi.push({ role: 'user', content: mesaj });

      try {
        setStatus(true, state.seciliYzler.length + ' YZ paralel düşünüyor...');

        const sonuc = await appScriptIstek('yz_sor', {
          soru: mesaj,
          hedefYzler: state.seciliYzler,
        });

        if (sonuc.basarili && sonuc.sonuclar) {
          sonuc.sonuclar.forEach(function(r) {
            if (r.basarili) {
              var yzAd = {
                'gemini': 'Gemini 2.5 Flash',
                'groq': 'Groq GPT-OSS',
                'deepseek': 'DeepSeek Chat',
                'openrouter': 'OpenRouter Llama',
                'mistral': 'Mistral Small'
              }[r.yz] || r.yz.toUpperCase();
              mesajEkle(r.cevap, 'yz', [], { 
                tarih: formatTarih(),
                yz_adi: yzAd,
                yz_kodu: r.yz
              });
              state.sohbetGecmisi.push({ role: 'assistant', content: '[' + r.yz + '] ' + r.cevap, yz: r.yz });
            } else {
              mesajEkle(r.hata, 'yz', [], { 
                tarih: formatTarih(),
                yz_adi: r.yz.toUpperCase() + ' HATA',
                yz_kodu: r.yz
              });
            }
          });
          sistemMesaji('🧠 5 YZ paralel cevabı tamamlandı.');
        } else {
          sistemMesaji('❌ Paralel sorgu hatası: ' + (sonuc.hata || 'Bilinmeyen'));
        }
        setStatus(true, 'Bağlı');
      } catch (error) {
        console.error(error);
        sistemMesaji('❌ Hata: ' + error.message);
        setStatus(false, 'Bağlantı hatası');
      } finally {
        state.isProcessing = false;
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<span>5 YZ\'ye Sor</span><span style="font-size:18px;">🧠</span>';
        messageInput.focus();
      }
    }

    async function oturumBaslat() {
      try {
        sistemMesaji('🔄 Oturum başlatılıyor... Drive dosyaları okunuyor.');
        setStatus(true, 'Oturum açılıyor...');

        const sonuc = await appScriptIstek('oturum_basla', {});
        if (sonuc.oturum_id) {
          state.oturumId = sonuc.oturum_id;
          updateOturum(state.oturumId);
          state.turSayaci = 0;
          updateCounter(state.turSayaci);
          sistemMesaji('✅ Oturum başlatıldı: ' + state.oturumId);
          setStatus(true, 'Bağlı');

          state._sonBaglam = sonuc.baglam || null;

          if (sonuc.baglam && sonuc.baglam.onceki_sohbet) {
            sistemMesaji('📖 Önceki oturumun sohbet geçmişi Drive\'dan okundu ve bağlama eklendi.');
          }

          if (sonuc.yz_cevabi) {
            mesajEkle(sonuc.yz_cevabi, 'yz', [], { 
              tarih: formatTarih(),
              yz_adi: sonuc.yz_adi || 'YZ',
              yz_kodu: sonuc.yz_kodu || 'otomatik'
            });
          }

          const baglam = sonuc.baglam || {};
          const acikVar = (baglam.acik_arge && baglam.acik_arge.length > 0) || (baglam.acik_sorunlar && baglam.acik_sorunlar.length > 0);
          if (acikVar) {
            setTimeout(function() { acilisRaporuGoster(baglam); }, 800);
          }
        } else {
          sistemMesaji('❌ Oturum başlatılamadı: ' + (sonuc.hata || 'Bilinmeyen'));
          setStatus(false, 'Hata');
        }
      } catch (error) {
        sistemMesaji('❌ Oturum hatası: ' + error.message);
        setStatus(false, 'Bağlantı hatası');
      }
    }

    // ============================================================
    etiketBar.addEventListener('click', function(e) {
      const btn = e.target.closest('.etiket-btn');
      if (!btn || btn === paralelToggleBtn) return;
      const etiket = btn.dataset.etiket;

      document.querySelectorAll('.etiket-btn[data-etiket]').forEach(function(b) { b.classList.remove('aktif'); });
      if (state.aktifEtiket === etiket) {
        state.aktifEtiket = null;
      } else {
        btn.classList.add('aktif');
        state.aktifEtiket = etiket;
        const mevcut = messageInput.value.trim();
        if (!mevcut.includes(etiket)) {
          messageInput.value = mevcut + (mevcut ? ' ' : '') + etiket;
        }
        messageInput.focus();
      }
    });

    paralelToggleBtn.addEventListener('click', function() {
      state.paralelModAcik = !state.paralelModAcik;
      paralelToggleBtn.classList.toggle('aktif', state.paralelModAcik);
      yzSecimBar.style.display = state.paralelModAcik ? 'flex' : 'none';
      sendBtn.innerHTML = state.paralelModAcik ? '<span>5 YZ\'ye Sor</span><span style="font-size:18px;">🧠</span>' : '<span>Gönder</span><span style="font-size:18px;">📤</span>';
    });

    yzSecimBar.addEventListener('click', function(e) {
      const btn = e.target.closest('.yz-secim');
      if (!btn) return;
      const yz = btn.dataset.yz;

      if (e.ctrlKey || e.metaKey) {
        btn.classList.toggle('aktif');
        if (btn.classList.contains('aktif')) {
          if (!state.seciliYzler.includes(yz)) state.seciliYzler.push(yz);
        } else {
          state.seciliYzler = state.seciliYzler.filter(function(y) { return y !== yz; });
        }
      } else {
        yzSecimBar.querySelectorAll('.yz-secim').forEach(function(b) { b.classList.remove('aktif'); });
        btn.classList.add('aktif');
        state.seciliYzler = [yz];
      }

      if (state.seciliYzler.length === 0) {
        const ilkBtn = yzSecimBar.querySelector('.yz-secim');
        if (ilkBtn) {
          ilkBtn.classList.add('aktif');
          state.seciliYzler = [ilkBtn.dataset.yz];
        }
      }
    });

    sendBtn.addEventListener('click', mesajGonder);

    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        mesajGonder();
      }
    });

    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // ============================================================
    // BAŞLAT
    // ============================================================
    async function init() {
      if (!CONFIG.APP_SCRIPT_URL || CONFIG.APP_SCRIPT_URL.indexOf('script.google.com') === -1) {
        sistemMesaji('❌ Lütfen CONFIG.APP_SCRIPT_URL\'yi kendi Web App URL\'nle güncelle!');
        setStatus(false, 'URL eksik');
        return;
      }

      await oturumBaslat();

      setTimeout(function() {
        if (chatArea.children.length === 0) {
          sistemMesaji('👋 Hoş geldin! Blueprint geliştirme asistanı aktif. Bir şeyler yazmaya başla.');
        }
      }, 500);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
