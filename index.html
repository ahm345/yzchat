    // ============================================================
    // ✅ KRİTİK YAMA: APPS SCRIPT İLETİŞİM (Simple Request & CORS Fix)
    // ============================================================
    // ============================================================
    // APPS SCRIPT İLETİŞİM KATMANI
    // ============================================================
    // ✅ ÇÖZÜM: fetch() yerine google.script.run kullanılıyor.
    //
    // Neden fetch() çalışmıyordu:
    //   Türkiye mobil ağlarında tarayıcı içinden script.google.com'a
    //   yapılan JavaScript fetch() istekleri DNS çözümlemesinde
    //   ERR_NAME_NOT_RESOLVED hatası alıyor. Sayfa yükleniyor (doGet)
    //   ama JS'ten ayrı HTTP isteği atılamıyor.
    //
    // Neden google.script.run çalışır:
    //   google.script.run Apps Script'in HTML sayfaları için sunduğu
    //   YERLEŞİK iletişim yöntemidir. Tarayıcıdan dışarıya HTTP isteği
    //   ATMAZ — sayfa zaten script.google.com içinde olduğu için
    //   direkt sunucu tarafındaki fonksiyonu çağırır. DNS sorunu yok.
    //
    // Nasıl çalışır:
    //   google.script.run
    //     .withSuccessHandler(fn)   // başarıda çağrılacak callback
    //     .withFailureHandler(fn)   // hata olursa çağrılacak callback
    //     .sunucuFonksiyonu(arg)    // Code.gs'teki public fonksiyon
    //
    // Biz bunu Promise'e sarıyoruz ki async/await ile kullanılabilsin.
    // Code.gs'e tek bir köprü fonksiyonu ekliyoruz: htmlKoprusu(payload)
    // Bu fonksiyon JSON string alır, doPost'un switch'ini çağırır,
    // JSON string döndürür. Böylece mevcut tüm kod değişmeden çalışır.

    function appScriptIstek(tip, veri) {
      veri = veri || {};
      const payload = {
        tip: tip,
        sifre: CONFIG.ERISIM_SIFRESI,
        ...veri,
        oturum_id: state.oturumId,
      };

      return new Promise(function(resolve, reject) {
        google.script.run
          .withSuccessHandler(function(jsonStr) {
            try {
              const sonuc = JSON.parse(jsonStr);
              resolve(sonuc);
            } catch(e) {
              reject(new Error('Sunucu geçersiz JSON döndürdü: ' + jsonStr.slice(0, 100)));
            }
          })
          .withFailureHandler(function(hata) {
            reject(new Error(hata.message || String(hata)));
          })
          .htmlKoprusu(JSON.stringify(payload));
      });
    }

    // ============================================================
    // AÇILIŞ RAPORU
    // ============================================================
    function acilisRaporuGoster(baglam) {
      const modal = document.getElementById('acilisRaporuModal');
      const icerik = document.getElementById('acilisRaporuIcerik');
      if (!baglam) return;

      const acikArge = (baglam.acik_arge || []);
      const acikSorun = (baglam.acik_sorunlar || []);
      const sonSohbet = baglam.onceki_sohbet ? '✅ Var (Drive\'dan okundu)' : '❌ Yok (ilk oturum)';

      let html = '<div style="background:#0b0e11;border:1px solid #30363d;border-radius:8px;padding:12px 14px;margin-bottom:12px;">';
      html += '<div style="font-weight:600;margin-bottom:8px;">📊 Bağlam Özeti</div>';
      html += '<div>📖 Önceki sohbet: ' + sonSohbet + '</div>';
      html += '<div>💡 Açık ARGE: <strong style="color:#58a6ff;">' + acikArge.length + '</strong></div>';
      html += '<div>⚠️ Açık Sorun: <strong style="color:#f85149;">' + acikSorun.length + '</strong></div>';
      html += '</div>';

      if (acikArge.length > 0) {
        html += '<div style="margin-bottom:8px;"><strong>💡 Açık ARGE\'ler:</strong></div>';
        acikArge.slice(0, 5).forEach(function(s) {
          html += '<div style="background:#0b0e11;border:1px solid #30363d;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:12px;color:#8b949e;">' + s + '</div>';
        });
        if (acikArge.length > 5) html += '<div style="color:#8b949e;font-size:11px;">...ve ' + (acikArge.length-5) + ' tane daha</div>';
      }
      if (acikSorun.length > 0) {
        html += '<div style="margin:8px 0;"><strong>⚠️ Açık Sorunlar:</strong></div>';
        acikSorun.slice(0, 5).forEach(function(s) {
          html += '<div style="background:#0b0e11;border:1px solid #30363d;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:12px;color:#8b949e;">' + s + '</div>';
        });
      }
      if (acikArge.length === 0 && acikSorun.length === 0) {
        html += '<div style="color:#3fb950;font-size:13px;">✅ Açık ARGE veya sorun yok. Temiz başlangıç!</div>';
      }

      icerik.innerHTML = html;
      modal.style.display = 'flex';

      const kapat = function() { modal.style.display = 'none'; };
      document.getElementById('acilisRaporuKapatBtn').onclick = kapat;
      document.getElementById('acilisRaporuKapatBtn2').onclick = kapat;
      document.getElementById('acilisRaporuDevamBtn').onclick = kapat;
    }

    document.getElementById('acilisRaporuBtn').addEventListener('click', function() {
      if (state._sonBaglam) {
        acilisRaporuGoster(state._sonBaglam);
      } else {
        sistemMesaji('⚠️ Önce oturum başlatılmalı.');
      }
    });

    // ============================================================
    // DASHBOARD
    // ============================================================
    async function dashboardGuncelle() {
      const icerik = document.getElementById('dashboardIcerik');
      const acikArge = (state._sonBaglam && state._sonBaglam.acik_arge) || [];
      const acikSorun = (state._sonBaglam && state._sonBaglam.acik_sorunlar) || [];

      const yzKullanim = {};
      state.sohbetGecmisi.forEach(function(m) {
        if (m.role === 'assistant' && m.yz) {
          yzKullanim[m.yz] = (yzKullanim[m.yz] || 0) + 1;
        }
      });
      const sorular = state.sohbetGecmisi.filter(function(m) { return m.role === 'user'; }).length;
      const cevaplar = state.sohbetGecmisi.filter(function(m) { return m.role === 'assistant'; }).length;

      // ✅ MADDE 3 — PROJE SEÇİMİ (açıklamalı kart listesi + yeni proje oluşturma)
      let projeHtml = '';
      try {
        const projeSonuc = await appScriptIstek('projeleri_listele');
        if (projeSonuc.basarili && projeSonuc.projeler && Object.keys(projeSonuc.projeler).length > 0) {
          state.projeSecimGerekli = true;
          if (projeSonuc.aktifProjeId) state.aktifProjeId = projeSonuc.aktifProjeId;
          const kartlar = Object.keys(projeSonuc.projeler).map(function(ad) {
            const kayit = projeSonuc.projeler[ad];
            // Geriye dönük uyumluluk: kayıt ya düz string (sadece klasör ID'si)
            // ya da {id, aciklama} objesi olabilir.
            const id = (typeof kayit === 'string') ? kayit : kayit.id;
            const aciklama = (typeof kayit === 'string') ? '' : (kayit.aciklama || '');
            const aktifMi = (id === state.aktifProjeId);
            return '<div class="proje-karti" data-proje-id="' + id + '" style="padding:10px 12px;margin-bottom:6px;border-radius:8px;cursor:pointer;border:1px solid ' + (aktifMi ? '#58a6ff' : '#30363d') + ';background:' + (aktifMi ? 'rgba(88,166,255,0.08)' : '#0b0e11') + ';">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;">' +
                '<strong style="font-size:13px;">' + (aktifMi ? '✅ ' : '📁 ') + escapeHtml(ad) + '</strong>' +
                (aktifMi ? '<span style="font-size:10px;color:#58a6ff;">AKTİF</span>' : '') +
              '</div>' +
              (aciklama ? '<div style="font-size:11px;color:#8b949e;margin-top:3px;">' + escapeHtml(aciklama) + '</div>' : '') +
            '</div>';
          }).join('');
          projeHtml = '<div style="margin-bottom:12px;">' +
            '<div style="font-size:11px;color:#8b949e;margin-bottom:6px;">📂 Proje Seç (YZ\'ye bağlanmadan önce şart)</div>' +
            '<div id="projeKartListesi">' + kartlar + '</div>' +
            '<button id="yeniProjeOlusturBtn" type="button" style="width:100%;margin-top:6px;padding:8px;border-radius:7px;border:1px dashed #30363d;background:transparent;color:#8b949e;cursor:pointer;font-size:12px;">➕ Yeni Proje Oluştur</button>' +
            '</div>';
        } else {
          // PROJE_LISTESI tanımlı değil — eski tek-proje davranışına devam (geriye dönük uyumluluk)
          state.projeSecimGerekli = false;
        }
      } catch (e) {
        projeHtml = '<div style="margin-bottom:12px;color:#f85149;font-size:12px;">⚠️ Proje listesi alınamadı: ' + e.message + '</div>';
      }

      let html = projeHtml;
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">';
      html += '<div style="background:#0b0e11;border:1px solid #30363d;border-radius:8px;padding:10px;">';
      html += '<div style="font-size:11px;color:#8b949e;">Soru / Cevap</div>';
      html += '<div style="font-size:20px;font-weight:700;">' + sorular + ' / ' + cevaplar + '</div></div>';
      html += '<div style="background:#0b0e11;border:1px solid #30363d;border-radius:8px;padding:10px;">';
      html += '<div style="font-size:11px;color:#8b949e;">Tur / Maks</div>';
      html += '<div style="font-size:20px;font-weight:700;">' + state.turSayaci + ' / ' + CONFIG.MAX_TUR + '</div></div>';
      html += '<div style="background:#0b0e11;border:1px solid #30363d;border-radius:8px;padding:10px;">';
      html += '<div style="font-size:11px;color:#8b949e;">Açık ARGE</div>';
      html += '<div style="font-size:20px;font-weight:700;color:#58a6ff;">' + acikArge.length + '</div></div>';
      html += '<div style="background:#0b0e11;border:1px solid #30363d;border-radius:8px;padding:10px;">';
      html += '<div style="font-size:11px;color:#8b949e;">Açık Sorun</div>';
      html += '<div style="font-size:20px;font-weight:700;color:#f85149;">' + acikSorun.length + '</div></div>';
      html += '</div>';

      html += '<div style="font-weight:600;font-size:12px;margin-bottom:6px;">Sonraki sentez: ' + (CONFIG.MAX_TUR - state.turSayaci) + ' tur kaldı</div>';
      html += '<div style="background:#0b0e11;border-radius:6px;height:8px;margin-bottom:12px;overflow:hidden;">';
      html += '<div style="background:#58a6ff;height:100%;width:' + Math.round((state.turSayaci/CONFIG.MAX_TUR)*100) + '%;transition:width 0.3s;"></div></div>';

      if (acikArge.length > 0) {
        html += '<div style="font-weight:600;font-size:12px;margin-bottom:6px;">💡 Açık ARGE\'ler</div>';
        acikArge.slice(0,3).forEach(function(s) {
          html += '<div style="font-size:11px;color:#8b949e;padding:4px 0;border-bottom:1px solid #30363d;">' + s.slice(0,80) + '</div>';
        });
      }

      if (state.aktifKonuId) {
        html += '<div style="margin-top:10px;padding:8px 10px;background:#0b0e11;border:1px solid #58a6ff;border-radius:6px;font-size:12px;">';
        html += '▶️ Aktif konu: <strong>' + state.aktifKonuId + '</strong></div>';
      }

      icerik.innerHTML = html;
    }

    const dashboardModal = document.getElementById('dashboardModal');
    document.getElementById('dashboardBtn').addEventListener('click', async function() {
      await dashboardGuncelle();
      dashboardModal.style.display = 'flex';
      dashboardProjeEtkilesimBagla();
    });
    document.getElementById('dashboardKapatBtn').addEventListener('click', function() {
      dashboardModal.style.display = 'none';
    });

    // Proje kartlarına ve "Yeni Proje Oluştur" butonuna tıklama olaylarını bağlar.
    // dashboardGuncelle() içeriği her yenilediğinde DOM elemanları yeniden
    // oluştuğu için bu fonksiyon dashboardGuncelle() sonrası her seferinde çağrılmalı.
    function dashboardProjeEtkilesimBagla() {
      document.querySelectorAll('.proje-karti').forEach(function(kart) {
        kart.addEventListener('click', async function() {
          const secilenId = this.dataset.projeId;
          if (!secilenId || secilenId === state.aktifProjeId) return;
          try {
            const sonuc = await appScriptIstek('proje_sec', { projeId: secilenId });
            if (sonuc.basarili) {
              state.aktifProjeId = secilenId;
              sistemMesaji('📂 Proje seçildi. Artık "🤖 YZ Bağlan" ile bağlanabilirsin.');
              await dashboardGuncelle();
              dashboardProjeEtkilesimBagla();
            } else {
              sistemMesaji('❌ Proje seçilemedi: ' + (sonuc.hata || 'bilinmeyen hata'));
            }
          } catch (err) {
            sistemMesaji('❌ Proje seçim isteği başarısız: ' + err.message);
          }
        });
      });

      const yeniBtn = document.getElementById('yeniProjeOlusturBtn');
      if (yeniBtn) {
        yeniBtn.addEventListener('click', async function() {
          const ad = await modalSor('Yeni Proje Adı', 'Örn: "Mobil Uygulama v2"', '');
          if (ad === null || !ad.trim()) return;
          const aciklama = await modalSor('Kısa Açıklama', 'Bu proje ne hakkında? (opsiyonel, listede görünecek)', '');
          if (aciklama === null) return;
          yeniBtn.disabled = true;
          yeniBtn.textContent = '🔄 Oluşturuluyor...';
          try {
            const sonuc = await appScriptIstek('proje_olustur', { ad: ad.trim(), aciklama: aciklama.trim() });
            if (sonuc.basarili) {
              state.aktifProjeId = sonuc.aktifProjeId;
              sistemMesaji('✅ "' + ad.trim() + '" projesi oluşturuldu ve aktif proje yapıldı.');
              await dashboardGuncelle();
              dashboardProjeEtkilesimBagla();
            } else {
              sistemMesaji('❌ Proje oluşturulamadı: ' + (sonuc.hata || 'bilinmeyen hata'));
            }
          } catch (err) {
            sistemMesaji('❌ Proje oluşturma isteği başarısız: ' + err.message);
          } finally {
            if (document.body.contains(yeniBtn)) {
              yeniBtn.disabled = false;
              yeniBtn.textContent = '➕ Yeni Proje Oluştur';
            }
          }
        });
      }
    }

    // ============================================================
    // BAĞLANTI TESTİ
    // ============================================================
    baglantiTestBtn.addEventListener('click', async function() {
      baglantiTestPaneli.style.display = 'block';
      baglantiTestSonuclari.innerHTML = '<span style="color:var(--text-muted);">🔄 Test ediliyor...</span>';
      try {
        const sonuc = await appScriptIstek('baglanti_testi');
        if (!sonuc.basarili) {
          baglantiTestSonuclari.innerHTML = '<span style="color:#ef4444;">❌ Test başarısız: ' + (sonuc.hata || 'bilinmeyen hata') + '</span>';
          return;
        }
        baglantiTestSonuclari.innerHTML = sonuc.sonuclar.map(function(r) {
          if (!r.key_var) return '<span style="background:#333;color:#888;">⬜ ' + r.yz + ' — key yok</span>';
          if (r.basarili) return '<span style="background:#065f46;color:#a7f3d0;">✅ ' + r.yz + '</span>';
          return '<span title="' + (r.detay || '').replace(/"/g, '&quot;') + '" style="background:#7f1d1d;color:#fecaca;cursor:help;">❌ ' + r.yz + ' — ' + (r.detay || 'hata').slice(0, 60) + '</span>';
        }).join('');
      } catch (err) {
        baglantiTestSonuclari.innerHTML = '<span style="color:#ef4444;">❌ İstek gönderilemedi: ' + err.message + '</span>';
      }
    });

    // ============================================================
    // ✅ DRIVE İŞLEMLERİ (tek buton, YZ'ye bağlanmadan çalışır)
    // ============================================================
    const driveIslemleriBtn = document.getElementById('driveIslemleriBtn');
    const driveIslemleriMenu = document.getElementById('driveIslemleriMenu');
    driveIslemleriBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      driveIslemleriMenu.style.display = driveIslemleriMenu.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', function() {
      driveIslemleriMenu.style.display = 'none';
    });
    document.querySelectorAll('.drive-islem-secenek').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        driveIslemleriMenu.style.display = 'none';
        const islem = this.dataset.islem;
        if (islem === 'dosya-sec') {
          driveSecBtn.click();
        } else if (islem === 'yapi-denetle') {
          driveDenetleBtn.click();
        }
      });
    });

    // ============================================================
    // DRIVE YAPISI DENETİMİ
    // ============================================================
    const driveDenetlePanel = document.getElementById('driveDenetlePanel');
    const driveDenetleIcerik = document.getElementById('driveDenetleIcerik');
    const driveDenetleBtn = document.createElement('button');
    driveDenetleBtn.addEventListener('click', async function() {
      driveDenetlePanel.style.display = 'flex';
      driveDenetleIcerik.innerHTML = '🔄 Denetleniyor...';
      try {
        const sonuc = await appScriptIstek('drive_denetle');
        if (!sonuc.basarili) {
          driveDenetleIcerik.innerHTML = '<span style="color:#f85149;">❌ ' + (sonuc.hata || 'Denetim başarısız') + '</span>';
          return;
        }
        let html = '<div style="margin-bottom:10px;">' +
          (sonuc.anaKlasorVar ? '✅' : '❌') + ' Ana klasör (ANA_KLASOR_ID) &nbsp; ' +
          (sonuc.anayasaVar ? '✅' : '❌') + ' 00_ANAYASA.md</div>';
        html += sonuc.klasorler.map(function(k) {
          let satir = '<div style="margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid #30363d;">';
          satir += '<div>' + (k.var_mi ? '✅' : '❌') + ' <strong>' + k.ad + '/</strong></div>';
          k.dosyalar.forEach(function(d) { satir += '<div style="padding-left:20px; color:#8b949e;">' + (d.var_mi ? '✅' : '❌') + ' ' + d.ad + '</div>'; });
          k.altKlasorler.forEach(function(a) { satir += '<div style="padding-left:20px; color:#8b949e;">' + (a.var_mi ? '✅' : '❌') + ' ' + a.ad + '/ (alt klasör)</div>'; });
          satir += '</div>';
          return satir;
        }).join('');
        const eksikVar = sonuc.klasorler.some(function(k) {
          return !k.var_mi || k.dosyalar.some(function(d){return !d.var_mi;}) || k.altKlasorler.some(function(a){return !a.var_mi;});
        });
        if (eksikVar) {
          html = '<div style="margin-bottom:12px; padding:10px; background:#3d2817; border:1px solid #f0883e; border-radius:8px; color:#f0883e;">⚠️ Eksik klasör/dosya var. Yeni bir oturum başlatmak (sayfayı yenilemek) bunları otomatik oluşturur — silme/değiştirme yapmaz.</div>' + html;
        } else {
          html = '<div style="margin-bottom:12px; padding:10px; background:#0d2818; border:1px solid #3fb950; border-radius:8px; color:#3fb950;">✅ Her şey eksiksiz.</div>' + html;
        }
        driveDenetleIcerik.innerHTML = html;
      } catch (err) {
        driveDenetleIcerik.innerHTML = '<span style="color:#f85149;">❌ ' + err.message + '</span>';
      }
    });
    document.getElementById('driveDenetleKapatBtn').addEventListener('click', function() {
      driveDenetlePanel.style.display = 'none';
    });

    // ============================================================
    // DRIVE'DAN DOSYA SEÇİCİ
    // ============================================================
    let drivePanelGeciciSecim = [];

    function driveSeciliDosyalariRenderEt() {
      if (!state.driveSeciliDosyalar.length) {
        driveSeciliDosyalarDiv.style.display = 'none';
        driveSeciliDosyalarDiv.innerHTML = '';
        return;
      }
      driveSeciliDosyalarDiv.style.display = 'flex';
      driveSeciliDosyalarDiv.innerHTML = state.driveSeciliDosyalar.map(function(d, i) {
        return '<span style="background:rgba(59,130,246,0.15); color:#93c5fd; padding:3px 8px; border-radius:6px; display:inline-flex; align-items:center; gap:6px;">📎 ' + d.ad +
          '<button data-idx="' + i + '" class="drive-chip-sil" style="background:none; border:none; color:#93c5fd; cursor:pointer; font-size:13px; padding:0;">✕</button></span>';
      }).join('');
      driveSeciliDosyalarDiv.querySelectorAll('.drive-chip-sil').forEach(function(btn) {
        btn.addEventListener('click', function() {
          state.driveSeciliDosyalar.splice(parseInt(this.dataset.idx, 10), 1);
          driveSeciliDosyalariRenderEt();
        });
      });
    }

    async function driveKlasoruAc(klasorId) {
      drivePanelIcerik.innerHTML = '<div style="color:var(--text-muted); font-size:13px;">🔄 Yükleniyor...</div>';
      try {
        const sonuc = await appScriptIstek('drive_gezin', { klasorId: klasorId });
        if (!sonuc.basarili) {
          drivePanelIcerik.innerHTML = '<div style="color:#ef4444; font-size:13px;">❌ ' + (sonuc.hata || 'Klasör okunamadı') + '</div>';
          return;
        }
        drivePanelBaslik.textContent = '📁 ' + sonuc.klasorAdi;
        drivePanel.dataset.klasorId = sonuc.klasorId;
        drivePanel.dataset.ustKlasorId = sonuc.ustKlasorId || '';

        let html = '';
        if (sonuc.ustKlasorId) html += '<div class="drive-item drive-ust" style="padding:8px 6px; cursor:pointer; border-bottom:1px solid var(--border,#333); color:var(--text-muted);">⬆️ .. (üst klasöre dön)</div>';
        
        sonuc.altKlasorler.forEach(function(k) {
          html += '<div class="drive-item drive-klasor" data-id="' + k.id + '" style="padding:8px 6px; cursor:pointer; border-bottom:1px solid var(--border,#222);">📁 ' + k.ad + '</div>';
        });
        sonuc.dosyalar.forEach(function(f) {
          const secili = drivePanelGeciciSecim.some(function(s) { return s.id === f.id; });
          html += '<div class="drive-item drive-dosya" data-id="' + f.id + '" data-ad="' + f.ad.replace(/"/g, '&quot;') + '" style="padding:8px 6px; cursor:pointer; border-bottom:1px solid var(--border,#222); display:flex; justify-content:space-between; ' + (secili ? 'background:rgba(59,130,246,0.15);' : '') + '"><span>📄 ' + f.ad + ' <span style="color:var(--text-muted); font-size:11px;">(' + f.boyutKB + ' KB)</span></span><span>' + (secili ? '✅' : '') + '</span></div>';
        });
        if (!sonuc.altKlasorler.length && !sonuc.dosyalar.length) {
          html += '<div style="color:var(--text-muted); font-size:13px; padding:8px 6px;">Bu klasör boş.</div>';
        }
        drivePanelIcerik.innerHTML = html;

        const ustEl = drivePanelIcerik.querySelector('.drive-ust');
        if (ustEl) ustEl.addEventListener('click', function() { driveKlasoruAc(drivePanel.dataset.ustKlasorId || null); });

        drivePanelIcerik.querySelectorAll('.drive-klasor').forEach(function(el) {
          el.addEventListener('click', function() { driveKlasoruAc(this.dataset.id); });
        });

        drivePanelIcerik.querySelectorAll('.drive-dosya').forEach(function(el) {
          el.addEventListener('click', function() {
            const id = this.dataset.id, ad = this.dataset.ad;
            const idx = drivePanelGeciciSecim.findIndex(function(s) { return s.id === id; });
            if (idx === -1) drivePanelGeciciSecim.push({ id: id, ad: ad });
            else drivePanelGeciciSecim.splice(idx, 1);
            driveKlasoruAc(drivePanel.dataset.klasorId);
          });
        });
      } catch (err) {
        drivePanelIcerik.innerHTML = '<div style="color:#ef4444; font-size:13px;">❌ ' + err.message + '</div>';
      }
    }

    driveSecBtn.addEventListener('click', function() {
      drivePanelGeciciSecim = [];
      drivePanel.style.display = 'flex';
      driveKlasoruAc(null); 
    });

    drivePanelKapatBtn.addEventListener('click', function() { drivePanel.style.display = 'none'; });

    driveEkleBtn.addEventListener('click', function() {
      drivePanelGeciciSecim.forEach(function(d) {
        if (!state.driveSeciliDosyalar.some(function(s) { return s.id === d.id; })) state.driveSeciliDosyalar.push(d);
      });
      driveSeciliDosyalariRenderEt();
      drivePanel.style.display = 'none';
    });

    // ============================================================
    // MODAL SİSTEMİ
    // ============================================================
    const _modalEl = document.createElement('div');
    _modalEl.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:9999;align-items:center;justify-content:center;';
    document.body.appendChild(_modalEl);

    function _modalKapat() { _modalEl.style.display = 'none'; _modalEl.innerHTML = ''; }

    function modalSor(baslik, aciklama, varsayilan) {
      return new Promise(function(resolve) {
        _modalEl.style.display = 'flex';
        _modalEl.innerHTML = '<div style="background:#1c2333;border:1px solid #30363d;border-radius:12px;padding:20px 22px;width:min(420px,90vw);">' +
          '<div style="font-size:14px;font-weight:600;margin-bottom:6px;">' + baslik + '</div>' +
          (aciklama ? '<div style="font-size:12px;color:#8b949e;margin-bottom:10px;">' + aciklama + '</div>' : '') +
          '<input id="_modalInput" type="text" value="' + escapeHtml(varsayilan || '') + '" style="width:100%;background:#0b0e11;border:1px solid #30363d;border-radius:6px;padding:8px 10px;color:#e6edf3;font-size:13px;outline:none;" />' +
          '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">' +
            '<button id="_modalIptal" style="padding:7px 14px;border-radius:7px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;">İptal</button>' +
            '<button id="_modalOk" style="padding:7px 14px;border-radius:7px;border:none;background:#58a6ff;color:#0b0e11;font-weight:600;cursor:pointer;">Tamam</button>' +
          '</div></div>';
        const inp = document.getElementById('_modalInput');
        inp.focus(); inp.select();
        function tamam() { _modalKapat(); resolve(inp.value); }
        function iptal() { _modalKapat(); resolve(null); }
        document.getElementById('_modalOk').addEventListener('click', tamam);
        document.getElementById('_modalIptal').addEventListener('click', iptal);
        inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') tamam(); if (e.key === 'Escape') iptal(); });
      });
    }

    function modalOnayla(baslik, aciklama) {
      return new Promise(function(resolve) {
        _modalEl.style.display = 'flex';
        _modalEl.innerHTML = '<div style="background:#1c2333;border:1px solid #30363d;border-radius:12px;padding:20px 22px;width:min(380px,90vw);">' +
          '<div style="font-size:14px;font-weight:600;margin-bottom:6px;">' + baslik + '</div>' +
          (aciklama ? '<div style="font-size:12px;color:#8b949e;margin-bottom:14px;">' + aciklama + '</div>' : '') +
          '<div style="display:flex;gap:8px;justify-content:flex-end;"><button id="_modalIptal" style="padding:7px 14px;border-radius:7px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;">Hayır</button><button id="_modalOk" style="padding:7px 14px;border-radius:7px;border:none;background:#f85149;color:#fff;font-weight:600;cursor:pointer;">Evet, Sil</button></div></div>';
        document.getElementById('_modalOk').addEventListener('click', function() { _modalKapat(); resolve(true); });
        document.getElementById('_modalIptal').addEventListener('click', function() { _modalKapat(); resolve(false); });
      });
    }

    function modalSec(baslik, secenekler) {
      return new Promise(function(resolve) {
        _modalEl.style.display = 'flex';
        const butonlar = Object.entries(secenekler).map(function(e) {
          return '<button class="_modalSecBtn" data-val="' + e[0] + '" style="display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;border-radius:7px;border:1px solid #30363d;background:#0b0e11;color:#e6edf3;cursor:pointer;">' + e[1] + '</button>';
        }).join('');
        _modalEl.innerHTML = '<div style="background:#1c2333;border:1px solid #30363d;border-radius:12px;padding:20px 22px;width:min(360px,90vw);"><div style="font-size:14px;font-weight:600;margin-bottom:12px;">' + baslik + '</div>' + butonlar + '<button id="_modalIptal" style="width:100%;padding:7px;border-radius:7px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;margin-top:4px;">İptal</button></div>';
        _modalEl.querySelectorAll('._modalSecBtn').forEach(function(b) {
          b.addEventListener('click', function() { _modalKapat(); resolve(this.dataset.val); });
        });
        document.getElementById('_modalIptal').addEventListener('click', function() { _modalKapat(); resolve(null); });
      });
    }

    // ============================================================
    // ARGE / ÖZEL "KONU" LİSTESİ PANELİ
    // ============================================================
    let konularAktifFiltre = '';

    async function konulariYukleVeGoster() {
      konularPanelIcerik.innerHTML = '<div style="color:var(--text-muted); font-size:13px;">🔄 Yükleniyor...</div>';
      try {
        const sonuc = await appScriptIstek('konu_listele', { konuTipi: konularAktifFiltre || null });
        if (!sonuc.basarili) {
          konularPanelIcerik.innerHTML = '<div style="color:#ef4444; font-size:13px;">❌ ' + (sonuc.hata || 'Liste alınamadı') + '</div>';
          return;
        }
        if (!sonuc.konular.length) {
          konularPanelIcerik.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding:8px 0;">Henüz kayıtlı konu yok.</div>';
          return;
        }
        konularPanelIcerik.innerHTML = sonuc.konular.map(function(k) {
          const ikon = k.tip === 'arge' ? '💡' : '🔒';
          const durumEtiketi = k.sonuc === 'beklemede'
            ? '<span style="color:#fbbf24;">● beklemede</span>'
            : (k.durum === 'acik' ? '<span style="color:#4ade80;">● açık</span>' : '<span style="color:var(--text-muted);">● kapalı (' + (k.sonuc || '') + ')</span>');
          return '<div style="padding:10px 0; border-bottom:1px solid var(--border,#222);"><div style="font-weight:600;">' + ikon + ' ' + k.id + ': ' + k.baslik + '</div><div style="font-size:11px; color:var(--text-muted); margin:4px 0;">📅 Açılış: ' + k.acilis + ' · 🔄 Son: ' + k.sonGuncelleme + ' · 💬 ' + (k.mesajSayisi || 0) + ' mesaj · ' + durumEtiketi + '</div>' +
            (k.durum === 'acik' ? ('<div style="display:flex; gap:6px; margin-top:6px;"><button class="konu-devam" data-id="' + k.id + '" data-tip="' + k.tip + '" style="font-size:12px; padding:3px 10px; border-radius:6px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">▶️ Devam Et</button>' + (k.tip === 'arge' ? '<button class="konu-kapat" data-id="' + k.id + '" style="font-size:12px; padding:3px 10px; border-radius:6px; border:1px solid var(--border,#333); background:transparent; color:var(--text-muted); cursor:pointer;">✅ Kapat</button>' : '') + '<button class="konu-sil" data-id="' + k.id + '" style="font-size:12px; padding:3px 10px; border-radius:6px; border:1px solid #7f1d1d; background:transparent; color:#fca5a5; cursor:pointer;">🗑️ Sil</button></div>') : ('<button class="konu-sil" data-id="' + k.id + '" style="font-size:12px; padding:3px 10px; border-radius:6px; border:1px solid #7f1d1d; background:transparent; color:#fca5a5; cursor:pointer;">🗑️ Sil</button>')) + '</div>';
        }).join('');

        konularPanelIcerik.querySelectorAll('.konu-devam').forEach(function(btn) {
          btn.addEventListener('click', function() {
            state.aktifKonuId = this.dataset.id;
            if (this.dataset.tip === 'ozel') {
              messageInput.value = '#özel';
              mesajGonder();
            } else {
              sistemMesaji('▶️ ' + this.dataset.id + ' aktif konu yapıldı. Bundan sonraki #arge mesajları bu konuya eklenecek.');
            }
            konularPanel.style.display = 'none';
          });
        });

        konularPanelIcerik.querySelectorAll('.konu-kapat').forEach(function(btn) {
          btn.addEventListener('click', async function() {
            const sonucTurleri = { '1': 'karara_donustu', '2': 'iptal', '3': 'beklemede' };
            const secimNo = await modalSec('ARGE sonucu ne oldu?', { '1': '✅ Karara dönüştü', '2': '❌ İptal', '3': '📝 Beklemede bırak' });
            if (!secimNo) return;
            const sonucTuru = sonucTurleri[secimNo];
            let karMetni = null;
            if (sonucTuru === 'karara_donustu') {
              karMetni = await modalSor('Karar ne oldu?', 'Boş bırakırsan ARGE başlığı kullanılır.');
              if (karMetni === null) return; 
            }
            const r = await appScriptIstek('konu_kapat', { konuId: this.dataset.id, sonuc: sonucTuru, karMetni: karMetni });
            if (r.basarili) {
              if (state.aktifKonuId === this.dataset.id) state.aktifKonuId = null;
              sistemMesaji('✅ ' + this.dataset.id + ' kapatıldı.' + (r.olusanKarar ? ' Karar oluştu: ' + r.olusanKarar : ''));
              konulariYukleVeGoster();
            } else {
              sistemMesaji('❌ Kapatma başarısız: ' + r.hata);
            }
          });
        });

        konularPanelIcerik.querySelectorAll('.konu-sil').forEach(function(btn) {
          btn.addEventListener('click', async function() {
            const onay = await modalOnayla(this.dataset.id + ' silinsin mi?', 'Bu işlem geri alınamaz.');
            if (!onay) return;
            const r = await appScriptIstek('konu_sil', { konuId: this.dataset.id });
            if (r.basarili) {
              if (state.aktifKonuId === this.dataset.id) state.aktifKonuId = null;
              konulariYukleVeGoster();
            } else {
              sistemMesaji('❌ Silme başarısız: ' + r.hata);
            }
          });
        });
      } catch (err) {
        konularPanelIcerik.innerHTML = '<div style="color:#ef4444; font-size:13px;">❌ ' + err.message + '</div>';
      }
    }

    konularBtn.addEventListener('click', function() {
      konularPanel.style.display = 'flex';
      konulariYukleVeGoster();
    });
    konularPanelKapatBtn.addEventListener('click', function() { konularPanel.style.display = 'none'; });
    konularPanel.querySelectorAll('.konu-filtre').forEach(function(btn) {
      btn.addEventListener('click', function() {
        konularPanel.querySelectorAll('.konu-filtre').forEach(function(b) { b.classList.remove('aktif'); });
        btn.classList.add('aktif');
        konularAktifFiltre = btn.dataset.tip;
        konulariYukleVeGoster();
      });
    });

    // ============================================================
    // ONAY GÖNDER
    // ============================================================
    async function onayGonder(messageDiv, meta) {
      try {
        setStatus(true, 'Onay gönderiliyor...');
        const sonuc = await appScriptIstek('onay', {
          onay_id: meta.onayId || uuid(),
          karar: 'evet',
          mesaj: meta.originalMessage || '',
        });

        if (sonuc.basarili) {
          sistemMesaji('✅ Onay işlemi tamamlandı. Değişiklik uygulandı.');
          if (sonuc.turSayaci !== undefined) {
            state.turSayaci = sonuc.turSayaci;
            updateCounter(state.turSayaci);
          }
        } else {
          sistemMesaji('❌ Onay hatası: ' + (sonuc.hata || 'Bilinmeyen'));
        }
        setStatus(true, 'Bağlı');
      } catch (e) {
        sistemMesaji('❌ Onay gönderilemedi: ' + e.message);
        setStatus(false, 'Bağlantı hatası');
      }
    }

    // ============================================================
    // MESAJ GÖNDER
    // ============================================================
    async function mesajGonder() {
      if (state.isProcessing) return;

      // ✅ MADDE 2 — YZ motoru manuel bağlanmadan mesaj gönderilemez
      if (!state.aiEngineAktif) {
        sistemMesaji('⚠️ Önce sağ üstten "🤖 YZ Bağlan" ile Yapay Zeka motorunu etkinleştirmelisin.');
        return;
      }

      const metin = messageInput.value.trim();
      if (!metin) return;

      // ✅ MADDE 4 — Birden fazla YZ seçiliyse otomatik olarak paralel sorgu yapılır
      if (state.seciliYzler.length > 1) {
        return paralelSorGonder(metin);
      }

      let etiketler = etiketleriBul(metin);
      if (state.aktifEtiket && !etiketler.includes(state.aktifEtiket)) {
        etiketler.push(state.aktifEtiket);
        if (!metin.includes(state.aktifEtiket)) {
          messageInput.value = metin + ' ' + state.aktifEtiket;
        }
      }

      const sonMetin = messageInput.value.trim();
      const sonEtiketler = etiketleriBul(sonMetin);
      const mesaj = sonMetin;
      const gonderilecekDosyalar = state.driveSeciliDosyalar.slice();

      let konuBaslikGirdisi = null;
      if (sonEtiketler.includes('#arge') && !state.aktifKonuId) {
        konuBaslikGirdisi = await modalSor('Yeni ARGE konusu', 'Kısa bir başlık ver — ileride "ARGE-003: Redis caching" gibi listede görünecek.\nBoş bırakırsan mesajın ilk 50 karakteri kullanılır.', '');
        if (konuBaslikGirdisi === null) konuBaslikGirdisi = '';
      }

      let ozelBaslikGirdisi = null;
      if (sonMetin.trim() === '#özel' || sonMetin.trim() === '#ozel') {
        ozelBaslikGirdisi = await modalSor('Özel kanal başlığı', 'Bu sohbet Drive\'a kaydedilmeyecek. Listede görünmesi için bir başlık ver.\nÖrn: "İş görüşmesi", "Kişisel not"', '');
        if (ozelBaslikGirdisi === null) ozelBaslikGirdisi = '';
      }

      messageInput.value = '';
      messageInput.style.height = 'auto';
      state.isProcessing = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span> Gönderiliyor...';

      state.mesajNo++;
      const buTurNumarasi = state.mesajNo;

      mesajEkle(mesaj, 'user', sonEtiketler, {
        tarih: formatTarih(),
        driveDosyalari: gonderilecekDosyalar.map(function(d) { return d.ad; }),
        mesajNo: buTurNumarasi,
      });
      state.sohbetGecmisi.push({ role: 'user', content: mesaj, etiketler: sonEtiketler });

      try {
        setStatus(true, 'YZ düşünüyor...');

        const sonuc = await appScriptIstek('mesaj', {
          kullanici_mesaji: mesaj,
          etiketler: sonEtiketler,
          sohbet_gecmisi: state.sohbetGecmisi,
          cot_modu: CONFIG.COT_MODU,
          drive_dosyalari: gonderilecekDosyalar.map(function(d) { return d.id; }),
          aktif_konu_id: state.aktifKonuId,
          konu_baslik: konuBaslikGirdisi,
          ozel_baslik: ozelBaslikGirdisi,
        });

        state.driveSeciliDosyalar = [];
        driveSeciliDosyalariRenderEt();

        if (sonuc.arge_konu && sonuc.arge_konu.id) {
          state.aktifKonuId = sonuc.arge_konu.id;
          sistemMesaji('💡 ' + sonuc.arge_konu.id + ' aktif konu: "' + sonuc.arge_konu.baslik + '"');
        } else if (!sonEtiketler.includes('#arge') && !sonuc.ozel_kanal) {
          state.aktifKonuId = null;
        }
        if (sonuc.aktif_konu_id !== undefined) {
          state.aktifKonuId = sonuc.aktif_konu_id; 
        }

        // ✅ MADDE 3 — #çık ile projeden de çıkıldıysa, YZ motorunu tekrar kapat
        // ve kullanıcıyı proje seçim ekranına (Dashboard) yönlendir.
        if (sonuc.proje_cikis) {
          state.aktifProjeId = null;
          state.aiEngineAktif = false;
          yzBaglanBtn.style.display = '';
          sendBtn.disabled = true;
          sendBtn.style.opacity = '0.5';
          sendBtn.innerHTML = '<span>YZ Bağlantısı Gerekli</span>';
          sistemMesaji('📂 Yeni proje seçmek için 📊 Dashboard\'u aç.');
        }

        if (sonuc.turSayaci !== undefined) {
          state.turSayaci = sonuc.turSayaci;
          updateCounter(state.turSayaci);
        }

        if (sonuc.oturum_id) {
          state.oturumId = sonuc.oturum_id;
          updateOturum(state.oturumId);
        }

        if (sonuc.yz_cevabi) {
          const yzEtiketler = etiketleriBul(sonuc.yz_cevabi);
          var otomatikGecis = sonuc.yz_otomatik_gecis || null;
          var gosterilecekCevap = sonuc.yz_cevabi;

          mesajEkle(gosterilecekCevap, 'yz', yzEtiketler, {
            tarih: formatTarih(),
            onaylandi: sonuc.onaylandi || false,
            originalMessage: mesaj,
            onayId: sonuc.onay_id,
            ozel_kanal: sonuc.ozel_kanal || false,
            yz_adi: sonuc.yz_adi || 'YZ',
            yz_kodu: sonuc.yz_kodu || 'otomatik',
            yz_otomatik_gecis: otomatikGecis,
            mesajNo: buTurNumarasi,
            imlaDuzeltilmis: !!sonuc.imla_duzeltilmis,
          });
          if (!sonuc.kayit_yapilmadi) {
            state.sohbetGecmisi.push({ role: 'assistant', content: sonuc.yz_cevabi });
          }
          if (CONFIG.COT_MODU && sonuc.cot_kaydedildi) {
            sistemMesaji('🧬 Düşünce zinciri + felsefe 07_YZ_DNA/yz_dna.jsonl\'e kaydedildi.');
          }
        }

        if (sonuc.sentezGerekli) {
          sistemMesaji('🔄 8. tur tamamlandı. Sentez yapılıyor...');
          const sentezSonuc = await appScriptIstek('sentez', {
            sohbet_gecmisi: state.sohbetGecmisi,
          });
          if (sentezSonuc.basarili) {
            sistemMesaji('✅ Sentez tamamlandı ve Drive\'a YAML olarak kaydedildi (03_SENTEZ/sentez_guncel.md).');
            if (sentezSonuc.parse_basarili === false) {
              sistemMesaji('⚠️ YZ\'nin cevabı tam YAML formatında gelmedi — ham metin yedek olarak saklandı, veri kaybolmadı.');
            }
            if (sentezSonuc.sayfa_yenilensin) {
              sistemMesaji('🔁 Pencere 3 saniye içinde yenilenecek — yeni oturum Drive\'dan temiz okunacak...');
              setTimeout(function() { window.location.reload(); }, 3000);
              return;
            }
            state.turSayaci = 0;
            updateCounter(state.turSayaci);
          } else {
            sistemMesaji('❌ Sentez hatası: ' + (sentezSonuc.hata || 'Bilinmeyen'));
          }
        }

        setStatus(true, 'Bağlı');
      } catch (error) {
        console.error(error);
        sistemMesaji('❌ Hata: ' + error.message);
        setStatus(false, 'Bağlantı hatası');
        mesajEkle('Üzgünüm, bir hata oluştu. Lütfen tekrar deneyin.', 'yz', [], { tarih: formatTarih() });
      } finally {
        state.isProcessing = false;
        sendBtn.disabled = false;
        sendBtn.innerHTML = state.seciliYzler.length > 1
          ? '<span>' + state.seciliYzler.length + ' YZ\'ye Sor</span><span style="font-size:18px;">🧠</span>'
          : '<span>Gönder</span><span style="font-size:18px;">📤</span>';
        messageInput.focus();
      }
    }

    // ============================================================
    // 5-YZ PARALEL SORGU
    // ============================================================
    async function paralelSorGonder(mesaj) {
      if (state.seciliYzler.length === 0) {
        sistemMesaji('⚠️ En az bir YZ seçmelisin.');
        return;
      }

      messageInput.value = '';
      messageInput.style.height = 'auto';
      state.isProcessing = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span> 5 YZ\'ye soruluyor...';

      mesajEkle(mesaj, 'user', [], { tarih: formatTarih() });
      state.sohbetGecmisi.push({ role: 'user', content: mesaj });

      try {
        setStatus(true, state.seciliYzler.length + ' YZ paralel düşünüyor...');

        const sonuc = await appScriptIstek('yz_sor', {
          soru: mesaj,
          hedefYzler: state.seciliYzler,
        });

        if (sonuc.basarili && sonuc.sonuclar) {
          sonuc.sonuclar.forEach(function(r) {
            if (r.basarili) {
              var yzAd = {
                'gemini': 'Gemini 2.5 Flash',
                'groq': 'Groq GPT-OSS',
                'deepseek': 'DeepSeek Chat',
                'openrouter': 'OpenRouter Llama',
                'mistral': 'Mistral Small'
              }[r.yz] || r.yz.toUpperCase();
              mesajEkle(r.cevap, 'yz', [], { 
                tarih: formatTarih(),
                yz_adi: yzAd,
                yz_kodu: r.yz
              });
              state.sohbetGecmisi.push({ role: 'assistant', content: '[' + r.yz + '] ' + r.cevap, yz: r.yz });
            } else {
              mesajEkle(r.hata, 'yz', [], { 
                tarih: formatTarih(),
                yz_adi: r.yz.toUpperCase() + ' HATA',
                yz_kodu: r.yz
              });
            }
          });
          sistemMesaji('🧠 5 YZ paralel cevabı tamamlandı.');
        } else {
          sistemMesaji('❌ Paralel sorgu hatası: ' + (sonuc.hata || 'Bilinmeyen'));
        }
        setStatus(true, 'Bağlı');
      } catch (error) {
        console.error(error);
        sistemMesaji('❌ Hata: ' + error.message);
        setStatus(false, 'Bağlantı hatası');
      } finally {
        state.isProcessing = false;
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<span>5 YZ\'ye Sor</span><span style="font-size:18px;">🧠</span>';
        messageInput.focus();
      }
    }

    // ============================================================
    // OTURUM BAŞLAT
    // ============================================================
    async function oturumBaslat() {
      try {
        sistemMesaji('🔄 Oturum başlatılıyor... Drive dosyaları okunuyor.');
        setStatus(true, 'Oturum açılıyor...');

        const sonuc = await appScriptIstek('oturum_basla', {});
        if (sonuc.oturum_id) {
          state.oturumId = sonuc.oturum_id;
          updateOturum(state.oturumId);
          state.turSayaci = 0;
          updateCounter(state.turSayaci);
          sistemMesaji('✅ Oturum başlatıldı: ' + state.oturumId);
          setStatus(true, 'Bağlı');

          state._sonBaglam = sonuc.baglam || null;

          if (sonuc.baglam && sonuc.baglam.onceki_sohbet) {
            sistemMesaji('📖 Önceki oturumun sohbet geçmişi Drive\'dan okundu ve bağlama eklendi.');
          }

          if (sonuc.yz_cevabi) {
            mesajEkle(sonuc.yz_cevabi, 'yz', [], { 
              tarih: formatTarih(),
              yz_adi: sonuc.yz_adi || 'YZ',
              yz_kodu: sonuc.yz_kodu || 'otomatik'
            });
          }

          const baglam = sonuc.baglam || {};
          const acikVar = (baglam.acik_arge && baglam.acik_arge.length > 0) || (baglam.acik_sorunlar && baglam.acik_sorunlar.length > 0);
          if (acikVar) {
            setTimeout(function() { acilisRaporuGoster(baglam); }, 800);
          }
        } else {
          sistemMesaji('❌ Oturum başlatılamadı: ' + (sonuc.hata || 'Bilinmeyen'));
          setStatus(false, 'Hata');
        }
      } catch (error) {
        sistemMesaji('❌ Oturum hatası: ' + error.message);
        setStatus(false, 'Bağlantı hatası');
      }
    }

    // ============================================================
    // ✅ SESLE YAZ — anlık konuşmayı metne çevirip yazı kutusuna yazar
    // (Gemini'nin ses analizinden farklı: internet/tarayıcı üzerinden
    // gerçek zamanlı konuşma-metin dönüşümü, YZ bağlantısı GEREKTİRMEZ.)
    // ------------------------------------------------------------
    // ÖNEMLİ KISIT: Bu sayfa Google Apps Script'in kendi "sandbox" iframe'i
    // içinde çalışıyor. Mikrofon izni tarayıcı ayarlarından verilmiş olsa
    // bile, Apps Script'in dış iframe'i mikrofon iznini bazen sayfaya
    // geçirmiyor ve "Permission denied" hatası veriyor. Bunun çözümü kodla
    // değil — web uygulamasını Google Sites/iframe içine gömmek yerine
    // doğrudan kendi "…/exec" bağlantısından, tarayıcıda AYRI BİR SEKMEDE
    // açmaktır. Aşağıdaki kod, izin reddedilirse bunu açıkça söyler.
    // ============================================================
    const SesTaniyici = window.SpeechRecognition || window.webkitSpeechRecognition;
    const sesleYazBtn = document.getElementById('sesleYazBtn');
    let sesTanimaAktif = false;
    let sesTanimaNesnesi = null;

    if (!SesTaniyici) {
      sesleYazBtn.title = 'Bu tarayıcı sesle yazmayı desteklemiyor (Chrome/Edge önerilir)';
      sesleYazBtn.style.opacity = '0.4';
    }

    sesleYazBtn.addEventListener('click', function() {
      if (!SesTaniyici) {
        sistemMesaji('❌ Bu tarayıcı sesle yazmayı desteklemiyor. Chrome veya Edge kullanmayı dene.');
        return;
      }

      if (sesTanimaAktif) {
        sesTanimaNesnesi.stop();
        return;
      }

      sesTanimaNesnesi = new SesTaniyici();
      sesTanimaNesnesi.lang = 'tr-TR';
      sesTanimaNesnesi.continuous = true;
      sesTanimaNesnesi.interimResults = true;

      const baslangicMetni = messageInput.value ? messageInput.value.trim() + ' ' : '';

      sesTanimaNesnesi.onstart = function() {
        sesTanimaAktif = true;
        sesleYazBtn.textContent = '⏹️';
        sesleYazBtn.style.color = 'var(--green)';
        sistemMesaji('🎙️ Dinliyorum... (durdurmak için tekrar bas)');
      };

      sesTanimaNesnesi.onresult = function(e) {
        let metin = '';
        for (let i = 0; i < e.results.length; i++) {
          metin += e.results[i][0].transcript;
        }
        messageInput.value = baslangicMetni + metin;
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
      };

      sesTanimaNesnesi.onerror = function(e) {
        if (e.error === 'not-allowed' || e.error === 'permission-denied' || e.error === 'service-not-allowed') {
          sistemMesaji('❌ Mikrofon erişimi reddedildi. Kontrol et: 1) Tarayıcı adres çubuğundaki 🔒 simgesinden bu site için Mikrofon izni "İzin Ver" olmalı. 2) Bu sayfa bir iframe/Google Sites içine gömülüyse, doğrudan web uygulaması linkini (…/exec) yeni bir sekmede aç — Apps Script iframe\'i mikrofon iznini bazen engeller.');
        } else if (e.error === 'no-speech') {
          sistemMesaji('⚠️ Ses algılanamadı, tekrar dener misin?');
        } else {
          sistemMesaji('❌ Sesle yazma hatası: ' + e.error);
        }
      };

      sesTanimaNesnesi.onend = function() {
        sesTanimaAktif = false;
        sesleYazBtn.textContent = '🎙️';
        sesleYazBtn.style.color = 'var(--accent)';
        messageInput.focus();
      };

      try {
        sesTanimaNesnesi.start();
      } catch (e) {
        sistemMesaji('❌ Sesle yazma başlatılamadı: ' + e.message);
      }
    });

    // ============================================================
    // ✅ MADDE 9 — MULTIMODAL SESLİ GİRDİ (Mikrofon — Gemini telaffuz analizi)
    // ============================================================
    let mediaRecorder = null;
    let sesChunks = [];

    mikrofonBtn.addEventListener('click', async function() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        mikrofonBtn.textContent = '🔴';
        mikrofonBtn.style.color = 'var(--red)';
        return;
      }

      if (!state.aiEngineAktif) {
        sistemMesaji('⚠️ Ses analizi için önce "🤖 YZ Bağlan" ile bağlanmalısın.');
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        sesChunks = [];

        mediaRecorder.ondataavailable = function(e) { sesChunks.push(e.data); };

        mediaRecorder.onstop = function() {
          stream.getTracks().forEach(function(t) { t.stop(); });
          const sesBlob = new Blob(sesChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.readAsDataURL(sesBlob);
          reader.onloadend = async function() {
            const base64Ses = reader.result.split(',')[1];
            sistemMesaji('🎤 Ses kaydı işleniyor...');
            try {
              const sonuc = await appScriptIstek('ses_analiz', {
                sesBase64: base64Ses,
                mimeType: 'audio/webm',
              });
              if (sonuc.basarili) {
                mesajEkle(sonuc.analiz, 'yz', [], { yz_adi: 'Gemini Ses Analizi', yz_kodu: 'gemini' });
              } else {
                sistemMesaji('❌ Ses analizi başarısız: ' + (sonuc.hata || 'bilinmeyen hata'));
              }
            } catch (e) {
              sistemMesaji('❌ Ses gönderilemedi: ' + e.message);
            }
          };
        };

        mediaRecorder.start();
        mikrofonBtn.textContent = '⏹️';
        mikrofonBtn.style.color = 'var(--green)';
        sistemMesaji('🔴 Kayıt başladı... (durdurmak için mikrofon butonuna tekrar bas)');
      } catch (e) {
        sistemMesaji('❌ Mikrofon erişimi reddedildi: ' + e.message + ' — Tarayıcının adres çubuğundaki 🔒 simgesinden mikrofon iznini kontrol et; sayfa bir iframe içindeyse …/exec linkini yeni sekmede aç.');
      }
    });

    // ============================================================
    // EVENT LISTENER'LAR
    // ============================================================
    etiketBar.addEventListener('click', function(e) {
      const btn = e.target.closest('.etiket-btn');
      if (!btn || btn === yzDropdownBtn) return;
      const etiket = btn.dataset.etiket;
      if (!etiket) return;

      document.querySelectorAll('.etiket-btn[data-etiket]').forEach(function(b) { b.classList.remove('aktif'); });
      if (state.aktifEtiket === etiket) {
        state.aktifEtiket = null;
      } else {
        btn.classList.add('aktif');
        state.aktifEtiket = etiket;
        const mevcut = messageInput.value.trim();
        if (!mevcut.includes(etiket)) {
          messageInput.value = mevcut + (mevcut ? ' ' : '') + etiket;
        }
        messageInput.focus();
      }
    });

    // ============================================================
    // ✅ MADDE 4 — ÇOKLU YZ SEÇİMİ (Görünmez akordeon/dropdown)
    // ============================================================
    yzDropdownBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      yzDropdownMenu.style.display = yzDropdownMenu.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', function() {
      yzDropdownMenu.style.display = 'none';
    });
    yzDropdownMenu.addEventListener('click', function(e) { e.stopPropagation(); });

    document.getElementById('yzHepsiniSec').addEventListener('change', function() {
      document.querySelectorAll('.yz-check').forEach(function(cb) {
        cb.checked = document.getElementById('yzHepsiniSec').checked;
      });
      yzSecimGuncelle();
    });
    document.querySelectorAll('.yz-check').forEach(function(cb) {
      cb.addEventListener('change', yzSecimGuncelle);
    });

    function yzSecimGuncelle() {
      const secili = [];
      document.querySelectorAll('.yz-check:checked').forEach(function(cb) { secili.push(cb.dataset.yz); });
      const hepsiCb = document.getElementById('yzHepsiniSec');
      const tumYz = document.querySelectorAll('.yz-check').length;
      hepsiCb.checked = secili.length === tumYz;
      if (secili.length === 0) {
        // En az bir YZ seçili kalmalı — ilkini geri işaretle
        const ilk = document.querySelector('.yz-check');
        if (ilk) { ilk.checked = true; secili.push(ilk.dataset.yz); }
      }
      state.seciliYzler = secili;
      yzDropdownBtn.textContent = '🤖 ' + secili.length + ' YZ Seçili ▼';
    }
    yzSecimGuncelle(); // başlangıç etiketini ayarla

    // ============================================================
    // ✅ MADDE 5 — SENTEZLE BUTONU
    // ============================================================
    function sentezButonuGuncelle() {
      sentezleBtn.style.display = state.seciliYanitlar.length > 0 ? 'inline-block' : 'none';
      sentezleBtn.textContent = '🔄 ' + state.seciliYanitlar.length + ' Yanıtı Sentezle';
    }

    sentezleBtn.addEventListener('click', async function() {
      if (state.seciliYanitlar.length === 0) return;
      const sonUserMesaji = state.sohbetGecmisi.filter(function(m) { return m.role === 'user'; }).pop();
      const orijinalSoru = sonUserMesaji ? sonUserMesaji.content : '';
      const seciliMetinler = state.seciliYanitlar.map(function(y) { return y.duzenlenmis || y.icerik; }).join('\n\n---\n\n');
      const sentezPrompt = 'Orijinal Soru: ' + orijinalSoru + '\n\nSeçilen Yanıtlar:\n' + seciliMetinler + '\n\nBu yanıtları analiz et, çelişen/uzlaşan noktaları belirt, nihai bir sentez üret.';

      sentezleBtn.disabled = true;
      sentezleBtn.textContent = '🔄 Sentezleniyor...';
      try {
        const sonuc = await appScriptIstek('yz_sor', {
          soru: sentezPrompt,
          hedefYzler: state.seciliYzler.length > 0 ? state.seciliYzler : ['gemini']
        });
        if (sonuc.basarili && sonuc.sonuclar) {
          sonuc.sonuclar.forEach(function(r) {
            if (r.basarili) {
              mesajEkle('🔄 SENTEZ:\n' + r.cevap, 'yz', [], { yz_adi: (YZ_ADLARI_HARITASI[r.yz] || r.yz) + ' Sentez', yz_kodu: r.yz });
            }
          });
        } else {
          sistemMesaji('❌ Sentez hatası: ' + (sonuc.hata || 'Bilinmeyen'));
        }
      } catch (err) {
        sistemMesaji('❌ Sentez isteği gönderilemedi: ' + err.message);
      } finally {
        sentezButonuGuncelle();
      }
    });

    const YZ_ADLARI_HARITASI = {
      'gemini': 'Gemini 2.5 Flash',
      'groq': 'Groq GPT-OSS',
      'deepseek': 'DeepSeek Chat',
      'openrouter': 'OpenRouter Llama',
      'mistral': 'Mistral Small'
    };

    sendBtn.addEventListener('click', mesajGonder);

    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        mesajGonder();
      }
    });

    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Mobilde klavye açılınca giriş çubuğunun görünür kalmasını garanti eder
    messageInput.addEventListener('focus', function() {
      setTimeout(function() {
        appYuksekligiAyarla();
        messageInput.scrollIntoView({ block: 'end', behavior: 'smooth' });
        chatArea.scrollTop = chatArea.scrollHeight;
      }, 250);
    });

    // ============================================================
    // BAŞLAT
    // ============================================================
    async function init() {
      if (!CONFIG.APP_SCRIPT_URL || CONFIG.APP_SCRIPT_URL.indexOf('script.google.com') === -1) {
        sistemMesaji('❌ Lütfen CONFIG.APP_SCRIPT_URL\'yi kendi Web App URL\'nle güncelle!');
        setStatus(false, 'URL eksik');
        return;
      }

      // ✅ MADDE 2 — Sayfa açılır açılmaz oturum/YZ bağlantısı KURULMAZ.
      // Sadece Drive tabanlı işlemler (dosya seç / drive denetle) hazır durumda bekler.
      // Kullanıcı "🤖 YZ Bağlan"a basınca oturumBaslat() burada değil, o tıklamada çağrılır.
      setStatus(true, 'Drive hazır — YZ bağlantısı bekleniyor');
      sistemMesaji('👋 Hoş geldin! Drive araçlarını (🗂️ Drive İşlemleri) YZ olmadan da kullanabilirsin.');

      // ✅ MADDE 3 — Proje listesi tanımlıysa, YZ'ye bağlanmadan ÖNCE proje
      // seçtirmek için Dashboard'u otomatik açıyoruz.
      await dashboardGuncelle();
      dashboardProjeEtkilesimBagla();
      if (state.projeSecimGerekli && !state.aktifProjeId) {
        dashboardModal.style.display = 'flex';
        sistemMesaji('📂 Devam etmeden önce bir proje seç ya da "➕ Yeni Proje Oluştur" ile yeni bir tane aç.');
      } else if (state.projeSecimGerekli && state.aktifProjeId) {
        sistemMesaji('📂 Aktif proje hazır. Sohbet etmek için sağ üstten "🤖 YZ Bağlan"a bas.');
      } else {
        sistemMesaji('Sohbet etmek için sağ üstten "🤖 YZ Bağlan"a bas.');
      }
    }

    // ============================================================
    // ✅ MADDE 1 — ŞİFRE MODAL'I MANTIĞI
    // ============================================================
    const sifreModal = document.getElementById('sifreModal');
    const uygulamaGovdesi = document.getElementById('uygulamaGovdesi');
    const sifreInput = document.getElementById('sifreInput');
    const sifreHata = document.getElementById('sifreHata');
    const sifreGirisBtn = document.getElementById('sifreGirisBtn');

    // ============================================================
    // ✅ MİKROFON İZNİNİ EN ERKEN NOKTADA OTOMATİK İSTE
    // ------------------------------------------------------------
    // ÖNEMLİ GERÇEK: Hiçbir web sitesi (Google dahil) tarayıcının izin
    // penceresini kullanıcı hiç etkileşime girmeden veya "sessizce" 
    // gösteremez — bu tarayıcıların kasıtlı güvenlik kısıtıdır, kod ile
    // atlanamaz. Yapabildiğimiz en iyi şey: izni EN ERKEN mümkün anda,
    // yani "Giriş Yap" butonuna basılır basılmaz, kullanıcı ayrı bir
    // "mikrofon iznini ver" butonuna tıklamak zorunda kalmadan istemek.
    // ============================================================
    async function mikrofonIzniIste() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        sistemMesaji('⚠️ Bu tarayıcı mikrofon erişimini desteklemiyor.');
        return;
      }
      try {
        if (navigator.permissions && navigator.permissions.query) {
          try {
            const durum = await navigator.permissions.query({ name: 'microphone' });
            if (durum.state === 'denied') {
              sistemMesaji('🚫 Mikrofon bu site için tarayıcı ayarlarından KALICI OLARAK engellenmiş. Adres çubuğundaki 🔒 simgesine tıkla → Site ayarları → Mikrofon → "İzin Ver" yap, sonra sayfayı yenile.');
              return;
            }
          } catch (e) { /* bazı tarayıcılar 'microphone' permissions sorgusunu desteklemez, sorun değil */ }
        }

        const akis = await navigator.mediaDevices.getUserMedia({ audio: true });
        akis.getTracks().forEach(function(t) { t.stop(); }); // sadece izni tetiklemek için açıp hemen kapatıyoruz
        sistemMesaji('✅ Mikrofon izni verildi. 🎙️ Sesle Yaz ve 🔴 Ses Kaydı butonları artık hazır.');
      } catch (e) {
        if (e.name === 'NotAllowedError') {
          sistemMesaji('❌ Mikrofon izni reddedildi. Adres çubuğundaki 🔒 simgesinden bu site için Mikrofon iznini "İzin Ver" yapıp sayfayı yenile.');
        } else if (e.name === 'NotFoundError') {
          sistemMesaji('❌ Bu cihazda/bilgisayarda mikrofon bulunamadı ya da başka bir uygulama tarafından kullanılıyor.');
        } else if (e.name === 'SecurityError' || e.name === 'NotSupportedError') {
          sistemMesaji('❌ Mikrofon, bu sayfanın çalıştığı Google Apps Script "iframe"i tarafından engelleniyor. Bu bizim kodumuzla düzeltemediğimiz bir Google kısıtı — çözüm: bu web uygulamasının ".../exec" linkini herhangi bir siteye/Google Sites\'e GÖMMEDEN, doğrudan yeni bir Chrome sekmesine yapıştırıp öyle aç.');
        } else {
          sistemMesaji('❌ Mikrofon izni alınamadı (' + e.name + '): ' + e.message);
        }
      }
    }

    async function sifreGirisiDene() {
      const girilenSifre = sifreInput.value.trim();
      if (!girilenSifre) return;
      sifreHata.style.display = 'none';
      sifreGirisBtn.disabled = true;
      sifreGirisBtn.textContent = '🔄 Kontrol ediliyor...';
      try {
        const sonuc = await new Promise(function(resolve, reject) {
          google.script.run
            .withSuccessHandler(function(jsonStr) {
              try { resolve(JSON.parse(jsonStr)); }
              catch (e) { reject(new Error('Sunucu geçersiz JSON döndürdü.')); }
            })
            .withFailureHandler(function(hata) { reject(new Error(hata.message || String(hata))); })
            .htmlKoprusu(JSON.stringify({ tip: 'sifre_kontrol', sifre: girilenSifre }));
        });

        if (sonuc.basarili && sonuc.onayli) {
          CONFIG.ERISIM_SIFRESI = girilenSifre; // doğrulanan şifre config'e yazılır
          sifreModal.style.display = 'none';
          uygulamaGovdesi.style.display = 'flex';
          mikrofonIzniIste(); // ✅ ayrı bir "izin ver" butonuna gerek kalmadan otomatik iste
          init();
        } else {
          sifreHata.textContent = '❌ Şifre hatalı';
          sifreHata.style.display = 'block';
        }
      } catch (e) {
        sifreHata.textContent = '❌ Bağlantı hatası: ' + e.message;
        sifreHata.style.display = 'block';
      } finally {
        sifreGirisBtn.disabled = false;
        sifreGirisBtn.textContent = 'Giriş Yap';
      }
    }

    sifreGirisBtn.addEventListener('click', sifreGirisiDene);
    sifreInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sifreGirisiDene();
    });
    sifreInput.focus();

    // ============================================================
    // ✅ MADDE 2 — YZ BAĞLAN BUTONU
    // ============================================================
    yzBaglanBtn.addEventListener('click', async function() {
      // ✅ MADDE 3 — proje listesi tanımlıysa, YZ'ye bağlanmadan önce proje seçilmiş olmalı
      if (state.projeSecimGerekli && !state.aktifProjeId) {
        sistemMesaji('⚠️ Önce 📊 Dashboard üzerinden bir proje seçmelisin.');
        return;
      }
      state.aiEngineAktif = true;
      yzBaglanBtn.style.display = 'none';
      setStatus(true, 'YZ Bağlı');
      sistemMesaji('🤖 Yapay Zeka motoru aktifleştirildi.');
      sendBtn.disabled = false;
      sendBtn.style.opacity = '1';
      sendBtn.innerHTML = '<span>Gönder</span><span style="font-size:18px;">📤</span>';
      await oturumBaslat();
    });
  </script>
</body>
</html>
